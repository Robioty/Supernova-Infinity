<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Merge: Supernova Absolute</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --gold: #fbbf24; --danger: #ef4444; --pink: #f472b6; }
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; user-select: none; }
        
        #ui-layer { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }
        #top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; align-items: center; }
        .menu-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; backdrop-filter: blur(10px); }
        
        #score-container { flex-grow: 1; text-align: center; }
        #score-label { font-size: 2.8em; font-weight: 900; text-shadow: 0 0 20px var(--accent); margin: 0; }
        
        #gravity-ui { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: row; align-items: center; gap: 12px; opacity: 0.8; }
        #gravity-cooldown { width: 100px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #gravity-fill { height: 100%; width: 100%; background: var(--gold); transform: scaleX(1); transform-origin: left; transition: transform 0.1s linear; }
        #g-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); color: var(--gold); background: rgba(0,0,0,0.3); font-weight: 900; cursor: pointer; pointer-events: auto; }
        #g-btn.charged { animation: pulseG 1.5s infinite; box-shadow: 0 0 15px var(--gold); }

        #comet-hitbox { position: absolute; width: 100px; height: 100px; z-index: 900; pointer-events: auto; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        #comet-visual { position: absolute; width: 30px; height: 30px; background: white; border-radius: 50%; box-shadow: -30px 0 40px var(--accent), 0 0 20px white; }

        #danger-alert { position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%); color: var(--danger); font-size: 3em; font-weight: 900; display: none; z-index: 1500; animation: flash 0.5s infinite alternate; }
        #event-banner { position: fixed; top: 140px; width: 100%; text-align: center; color: var(--pink); font-weight: 900; font-size: 2em; display: none; z-index: 500; }

        .overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; pointer-events: auto; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px 40px; border-radius: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1em; }

        @keyframes flash { from { opacity: 0.2; } to { opacity: 1; } }
        @keyframes pulseG { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="comet-hitbox" onclick="catchComet()"><div id="comet-visual"></div></div>
    <div id="danger-alert">⚠️ DANGER ⚠️</div>
    <div id="event-banner">BLACK HOLE DETECTED!</div>

    <div id="ui-layer">
        <div id="top-bar">
            <button class="menu-btn" onclick="location.reload()">🔄</button>
            <div id="score-container">
                <div id="score-label">0</div>
                <div style="font-size:0.8em; opacity:0.6;">BEST: <span id="high-score">0</span></div>
            </div>
        </div>
        <div id="gravity-ui">
            <div id="gravity-cooldown"><div id="gravity-fill"></div></div>
            <button id="g-btn" class="charged" onclick="flipGravity()">G</button>
        </div>
    </div>

    <div id="home-screen" class="overlay">
        <h1 style="font-size: 3em; color: var(--accent); margin: 0;">SUPERNOVA</h1>
        <button class="btn" onclick="handleStart()">START MISSION</button>
        <div style="margin-top:20px; pointer-events: auto;">
            <input type="checkbox" id="skip-tutorial"> <label for="skip-tutorial">Skip Tutorial</label>
        </div>
    </div>

    <div id="tutorial-overlay" class="overlay" style="display:none">
        <h2 style="color:var(--gold)">GRAVITY & COMETS</h2>
        <p>Gravity starts <b>FULL</b>. Tap passing <b>Comets</b> to instant-charge!</p>
        <button class="btn" onclick="startGame()">I'M READY</button>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none">
        <h2 style="color:var(--danger)">MISSION FAILED</h2>
        <h1 id="final-score" style="font-size: 4em; margin: 0;">0</h1>
        <button class="btn" onclick="location.reload()">RE-TRY</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;
    const engine = Engine.create({ enableSleeping: false });
    const width = window.innerWidth, height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent' } });

    let score = 0, nextLevel = 0, isGameOver = false, isFlipped = false, gameStarted = false;
    let currentX = width/2, gravityCharge = 120000, blackHoleActive = false;
    const CHARGE_TIME = 120000;

    const PLANET_DATA = [
        { primary: '#cbd5e1', accent: '#94a3b8', glow: 'rgba(203,213,225,0.3)' }, 
        { primary: '#4ade80', accent: '#166534', glow: 'rgba(74,222,128,0.3)' }, 
        { primary: '#f87171', accent: '#991b1b', glow: 'rgba(248,113,113,0.3)' }, 
        { primary: '#fbbf24', accent: '#b45309', stripes: true, glow: 'rgba(251,191,36,0.4)' }, 
        { primary: '#818cf8', accent: '#3730a3', stripes: true, glow: 'rgba(129,140,248,0.4)' }, 
        { primary: '#38bdf8', accent: '#075985', rings: true, glow: 'rgba(56,189,248,0.5)' }, 
        { primary: '#f472b6', accent: '#ffffff', core: true, glow: 'rgba(244,114,182,0.8)' } 
    ];

    function handleStart() {
        document.getElementById('home-screen').style.display = 'none';
        if (document.getElementById('skip-tutorial').checked) startGame();
        else document.getElementById('tutorial-overlay').style.display = 'flex';
    }

    function startGame() {
        document.getElementById('tutorial-overlay').style.display = 'none';
        document.getElementById('high-score').innerText = localStorage.getItem('gm_best') || 0;
        gameStarted = true;
        Composite.add(engine.world, [
            Bodies.rectangle(5, height/2, 10, height, { isStatic: true }),
            Bodies.rectangle(width-5, height/2, 10, height, { isStatic: true }),
            Bodies.rectangle(width/2, height+30, width, 60, { isStatic: true }),
            Bodies.rectangle(width/2, -30, width, 60, { isStatic: true })
        ]);
        nextLevel = Math.floor(Math.random() * 3);
        Render.run(render); Runner.run(Runner.create(), engine);
        spawnComet();
    }

    function spawnComet() {
        if (isGameOver) return;
        const hit = document.getElementById('comet-hitbox');
        hit.style.top = (Math.random() * (height - 300) + 150) + 'px';
        hit.style.display = 'block';
        let pos = -100;
        const move = setInterval(() => {
            pos += 7; hit.style.left = pos + 'px';
            if (pos > width + 100 || isGameOver) {
                hit.style.display = 'none'; clearInterval(move);
                if(!isGameOver) setTimeout(spawnComet, 15000);
            }
        }, 16);
    }

    function catchComet() { gravityCharge = CHARGE_TIME; document.getElementById('comet-hitbox').style.display = 'none'; }

    function spawn(x, y, lvl) {
        const r = [22, 34, 48, 62, 82, 108, 138][lvl];
        const b = Bodies.circle(x, y, r, { restitution: 0.3, friction: 0.05, timestamp: Date.now(), plugin: { level: lvl, merged: false }, render: { visible: false } });
        Composite.add(engine.world, b);
    }

    function triggerBlackHole() {
        blackHoleActive = true; document.getElementById('event-banner').style.display = 'block';
        setTimeout(() => { blackHoleActive = false; document.getElementById('event-banner').style.display = 'none'; }, 5000);
    }

    Events.on(engine, 'beforeUpdate', () => {
        const bodies = Composite.allBodies(engine.world).filter(b => b.plugin.level !== undefined);
        bodies.forEach((bA, i) => {
            if (blackHoleActive) {
                const pull = Vector.sub({x: width/2, y: height/2}, bA.position);
                Body.applyForce(bA, bA.position, Vector.mult(Vector.normalise(pull), 0.0006 * bA.mass));
            }
            for (let j = i + 1; j < bodies.length; j++) {
                const bB = bodies[j];
                if (bA.plugin.level === bB.plugin.level && !bA.plugin.merged && !bB.plugin.merged) {
                    const dist = Vector.magnitude(Vector.sub(bA.position, bB.position));
                    if (dist < (bA.circleRadius + bB.circleRadius) * 1.5) {
                        const force = Vector.mult(Vector.normalise(Vector.sub(bB.position, bA.position)), 0.003 * bA.mass);
                        Body.applyForce(bA, bA.position, force);
                        Body.applyForce(bB, bB.position, Vector.neg(force));
                    }
                }
            }
        });
    });

    Events.on(engine, 'collisionActive', (e) => {
        e.pairs.forEach(p => {
            const { bodyA: a, bodyB: b } = p;
            if (a.plugin?.level !== undefined && a.plugin.level === b.plugin?.level && !a.plugin.merged && !b.plugin.merged) {
                if (Date.now() - a.timestamp < 100) return;
                a.plugin.merged = b.plugin.merged = true;
                const lvl = a.plugin.level + 1;
                const mid = { x: (a.position.x + b.position.x)/2, y: (a.position.y + b.position.y)/2 };
                Composite.remove(engine.world, [a, b]);
                if (lvl < 7) {
                    spawn(mid.x, mid.y, lvl);
                    if (lvl > 3 && Math.random() < 0.08) triggerBlackHole();
                }
                score += (lvl * 35);
                document.getElementById('score-label').innerText = score;
            }
        });
    });

    function flipGravity() { if (gravityCharge >= CHARGE_TIME) { isFlipped = !isFlipped; engine.gravity.y *= -1; gravityCharge = 0; } }

    Events.on(render, 'afterRender', () => {
        if (!gameStarted || isGameOver) return;
        const ctx = render.context;
        const limitY = isFlipped ? height - 160 : 160;
        let danger = false;

        ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)'; ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(width, limitY); ctx.stroke(); ctx.setLineDash([]);

        // Ghost Preview
        ctx.save(); ctx.globalAlpha = 0.2;
        drawPlanet(ctx, currentX, isFlipped ? height - 90 : 90, [22, 34, 48][nextLevel], nextLevel);
        ctx.restore();

        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined) return;
            drawPlanet(ctx, b.position.x, b.position.y, b.circleRadius, b.plugin.level, b.angle);

            const isOver = isFlipped ? (b.position.y > limitY) : (b.position.y < limitY);
            if (isOver && (Date.now() - b.timestamp > 2000)) {
                danger = true;
                if (!b.warn) b.warn = Date.now();
                if (Date.now() - b.warn > 3000) {
                    isGameOver = true;
                    document.getElementById('game-over-screen').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                    localStorage.setItem('gm_best', Math.max(score, localStorage.getItem('gm_best') || 0));
                }
            } else b.warn = null;
        });

        document.getElementById('danger-alert').style.display = danger ? 'block' : 'none';
        if (gravityCharge < CHARGE_TIME) gravityCharge += 16.6; 
        document.getElementById('gravity-fill').style.transform = `scaleX(${Math.min(1, gravityCharge/CHARGE_TIME)})`;
        const gBtn = document.getElementById('g-btn');
        if (gravityCharge >= CHARGE_TIME) gBtn.classList.add('charged'); else gBtn.classList.remove('charged');
    });

    function drawPlanet(ctx, x, y, r, lvl, angle = 0) {
        const data = PLANET_DATA[lvl];
        ctx.save(); ctx.translate(x, y);
        const glow = ctx.createRadialGradient(0, 0, r, 0, 0, r * 1.3);
        glow.addColorStop(0, data.glow); glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, r * 1.3, 0, Math.PI*2); ctx.fill();
        ctx.rotate(angle);
        const grad = ctx.createRadialGradient(-r/3, -r/3, 0, 0, 0, r);
        grad.addColorStop(0, '#ffffff88'); grad.addColorStop(0.3, data.primary); grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
        if (data.rings) {
            ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = r/5;
            ctx.beginPath(); ctx.ellipse(0, 0, r*1.8, r*0.5, 0.5, 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore();
    }

    window.addEventListener('pointermove', (e) => { currentX = Math.max(40, Math.min(width-40, e.clientX)); });
    window.addEventListener('pointerup', (e) => {
        if (!gameStarted || isGameOver || e.target.closest('#gravity-ui, .menu-btn, #comet-hitbox, .overlay')) return;
        spawn(currentX, isFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3);
    });
</script>
</body>
</html>
