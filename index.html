<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gravity Merge Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); font-family: 'Segoe UI', sans-serif; touch-action: none; position: fixed; width: 100%; height: 100%; color: white; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; align-items: flex-start; gap: 15px; pointer-events: none; }
        .menu-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; font-size: 1.2em; backdrop-filter: blur(10px); }
        
        #progress-wrapper { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); z-index: 20; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #38bdf8, #818cf8); transition: width 0.4s ease; box-shadow: 0 0 10px #38bdf8; }

        .combo-text { position: absolute; color: #fbbf24; font-weight: 900; font-size: 2em; pointer-events: none; z-index: 30; text-shadow: 0 0 10px rgba(0,0,0,0.5); animation: comboFloat 0.8s ease-out forwards; }
        @keyframes comboFloat { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.2); opacity: 1; } 100% { transform: translateY(-50px) scale(1); opacity: 0; } }

        /* Panels */
        .glass-panel { 
            position: absolute; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(56, 189, 248, 0.3); 
            border-radius: 20px; padding: 20px; display: none; flex-direction: column; align-items: center;
            z-index: 100; backdrop-filter: blur(15px); left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 280px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        #settings-panel { top: 75px; left: 15px; transform: none; width: 180px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; width: 100%; margin-bottom: 10px; }
        .toggle { width: 36px; height: 18px; background: #334155; border-radius: 20px; position: relative; cursor: pointer; }
        .toggle.on { background: #38bdf8; }
        .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .toggle.on::after { left: 20px; }

        .leaderboard-list { width: 100%; margin: 15px 0; font-family: monospace; }
        .leader-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .leader-row.highlight { color: #38bdf8; font-weight: bold; }

        #name-input { background: rgba(255,255,255,0.1); border: 1px solid #38bdf8; color: white; text-align: center; font-size: 1.5em; width: 100px; border-radius: 8px; margin: 10px 0; text-transform: uppercase; }
        
        #preview-container { position: absolute; top: 15px; right: 15px; background: rgba(15, 23, 42, 0.4); padding: 8px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.2); backdrop-filter: blur(5px); }
        #side-controls { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 50; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .g-btn { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 2px solid #38bdf8; width: 54px; height: 54px; border-radius: 50%; font-weight: 900; cursor: pointer; display: none; }
        #cooldown-fill { width: 4px; height: 0%; background: #38bdf8; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); transition: height 0.1s linear; border-radius: 4px; }
        #cooldown-bar-wrap { width: 4px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; position: relative; display: none; }

        .btn { background: #38bdf8; color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
        <div>
            <div id="score-label" style="font-size: 2.8em; font-weight: 900; line-height: 1;">0</div>
            <div style="font-size: 0.75em; opacity: 0.6; letter-spacing: 1px;">BEST: <span id="high-score-ui">0</span></div>
        </div>
    </div>

    <div id="settings-panel" class="glass-panel">
        <div class="setting-item"><span>Shake</span><div id="shake-toggle" class="toggle on" onclick="updateSetting('shake')"></div></div>
        <div class="setting-item"><span>Vibe</span><div id="vibe-toggle" class="toggle on" onclick="updateSetting('vibe')"></div></div>
        <div class="setting-item"><span>Laser</span><div id="laser-toggle" class="toggle on" onclick="updateSetting('laser')"></div></div>
        <button class="btn" style="background:#ef4444" onclick="location.reload()">RESTART</button>
    </div>

    <div id="game-over-panel" class="glass-panel">
        <h2 id="end-msg" style="margin:0; color:#38bdf8;">GAME OVER</h2>
        <div id="new-high-score-ui" style="display:none; text-align:center;">
            <p>NEW HIGH SCORE!</p>
            <input type="text" id="name-input" maxlength="3" placeholder="AAA">
        </div>
        <div class="leaderboard-list" id="leaderboard-list"></div>
        <button class="btn" onclick="saveAndRestart()">PLAY AGAIN</button>
    </div>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.9); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="font-size: 3.5em; margin: 0; letter-spacing:-2px;">GRAVITY<br><span style="color:#38bdf8">MERGE</span></h1>
        <button class="btn" onclick="initGame()" style="width:200px; font-size:1.2em; padding:20px;">START</button>
    </div>

    <div id="progress-wrapper"><div id="progress-fill"></div></div>
    <div id="preview-container"><canvas id="preview-canvas" width="45" height="45"></canvas></div>
    <div id="side-controls">
        <div id="cooldown-bar-wrap"><div id="cooldown-fill"></div></div>
        <button id="g-toggle" class="g-btn" onclick="flipGravity()">G</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
    const engine = Engine.create({ positionIterations: 12, velocityIterations: 12 });
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ element: document.body, engine: engine, options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio, antialiasing: true } });

    let settings = { shake: true, vibe: true, laser: true };
    let gameStats = { score: 0, maxLevel: 0, combo: 0, lastMergeTime: 0 };
    let nextLevel = 0, currentX = width/2, isGameOver = false, canDrop = true, isStarted = false, isGravityFlipped = false, cooldownActive = false;
    const COOLDOWN_TIME = 5000, padding = 130;

    const BALL_TYPES = [
        { label: 'Neon', r: 15, col: '#22d3ee', score: 2, mass: 1 },
        { label: 'Candy', r: 25, col: '#f43f5e', score: 5, mass: 1.2 },
        { label: 'Lime', r: 35, col: '#a3e635', score: 10, mass: 2.5 },
        { label: 'Chrome', r: 48, col: '#94a3b8', score: 20, mass: 18 }, 
        { label: 'Amethyst', r: 65, col: '#8b5cf6', score: 40, mass: 35 },
        { label: 'Gold', r: 85, col: '#fbbf24', score: 80, mass: 70 },
        { label: 'Ruby', r: 110, col: '#ef4444', score: 150, mass: 140 },
        { label: 'Obsidian', r: 140, col: '#0f172a', score: 1000, mass: 400 }
    ];

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    function updateSetting(type) {
        settings[type] = !settings[type];
        document.getElementById(type + '-toggle').classList.toggle('on');
    }

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-toggle').style.display = 'block';
        document.getElementById('cooldown-bar-wrap').style.display = 'block';
        updateUIBest();
        isStarted = true;
        Render.run(render);
        Runner.run(Runner.create(), engine);
        drawPreview();
    }

    function updateUIBest() {
        const leaderboard = JSON.parse(localStorage.getItem('gm_leaderboard') || '[]');
        document.getElementById('high-score-ui').innerText = leaderboard[0]?.score || 0;
    }

    function drawPreview() {
        const preCtx = document.getElementById('preview-canvas').getContext('2d');
        preCtx.clearRect(0, 0, 45, 45);
        const t = BALL_TYPES[nextLevel];
        const grad = preCtx.createRadialGradient(22-5, 22-5, 2, 22, 22, 18);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.2, t.col); grad.addColorStop(1, '#000');
        preCtx.fillStyle = grad; preCtx.beginPath(); preCtx.arc(22, 22, 15, 0, Math.PI*2); preCtx.fill();
    }

    function triggerShake(intensity = 5) {
        if(!settings.shake) return;
        const start = Date.now(), duration = 200;
        const shake = () => {
            const elapsed = Date.now() - start;
            if (elapsed < duration) {
                document.body.style.transform = `translate(${(Math.random()-0.5)*intensity}px, ${(Math.random()-0.5)*intensity}px)`;
                requestAnimationFrame(shake);
            } else document.body.style.transform = 'translate(0,0)';
        };
        shake();
    }

    function showCombo(x, y, count) {
        const div = document.createElement('div');
        div.className = 'combo-text';
        div.style.left = x + 'px'; div.style.top = y + 'px';
        div.innerText = `Combo x${count}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function spawn(x, y, lvl, isMerge = false) {
        const t = BALL_TYPES[lvl];
        const b = Bodies.circle(x, y, t.r, {
            restitution: 0.2, friction: 0.1, density: t.mass * 0.001,
            render: { fillStyle: t.col }, plugin: { level: lvl, created: Date.now() }
        });

        if(isMerge) {
            Body.scale(b, 0.4, 0.4);
            let f = 0;
            const grow = () => { if(f++ < 6) { Body.scale(b, 1.18, 1.18); requestAnimationFrame(grow); } };
            grow();
            if (lvl >= 3) { triggerShake(lvl*2); if(settings.vibe && window.navigator.vibrate) window.navigator.vibrate(20); }
            const prog = (lvl / (BALL_TYPES.length - 1)) * 100;
            document.getElementById('progress-fill').style.width = prog + "%";
        }

        Composite.add(engine.world, b);
        if(lvl > gameStats.maxLevel) gameStats.maxLevel = lvl;
    }

    window.addEventListener('pointermove', (e) => {
        const rect = render.canvas.getBoundingClientRect();
        currentX = Math.max(30, Math.min(width - 30, e.clientX - rect.left));
    });

    window.addEventListener('pointerup', (e) => {
        if (e.target.closest('.glass-panel') || e.target.closest('.menu-btn') || e.target.closest('#side-controls')) return;
        if (!canDrop || isGameOver || !isStarted) return;
        spawn(currentX, isGravityFlipped ? height - 90 : 90, nextLevel);
        canDrop = false; setTimeout(() => canDrop = true, 500);
        nextLevel = Math.floor(Math.random() * 3); drawPreview();
    });

    function flipGravity() {
        if (cooldownActive || isGameOver) return;
        engine.gravity.y *= -1; isGravityFlipped = !isGravityFlipped;
        cooldownActive = true;
        const btn = document.getElementById('g-toggle'), fill = document.getElementById('cooldown-fill');
        let s = Date.now();
        const t = setInterval(() => {
            let el = Date.now() - s;
            fill.style.height = (100 - (el/COOLDOWN_TIME)*100) + "%";
            if (el >= COOLDOWN_TIME) { clearInterval(t); cooldownActive = false; fill.style.height = "0%"; }
        }, 50);
        triggerShake(10); if(settings.vibe && window.navigator.vibrate) window.navigator.vibrate(40);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined) {
                const lvl = a.plugin.level + 1;
                if(lvl >= BALL_TYPES.length) { endGame("VICTORY!"); return; }
                const now = Date.now();
                gameStats.combo = (now - gameStats.lastMergeTime < 600) ? gameStats.combo + 1 : 1;
                gameStats.lastMergeTime = now;
                gameStats.score += BALL_TYPES[a.plugin.level].score * gameStats.combo;
                document.getElementById('score-label').innerText = gameStats.score;
                if(gameStats.combo > 1) showCombo(a.position.x, a.position.y, gameStats.combo);
                Composite.remove(engine.world, [a, b]);
                spawn((a.position.x+b.position.x)/2, (a.position.y+b.position.y)/2, lvl, true);
            }
        });
    });

    setInterval(() => {
        if (isGameOver || !isStarted) return;
        const loseY = isGravityFlipped ? height - padding : padding;
        Composite.allBodies(engine.world).forEach(b => {
            if (!b.isStatic && Math.abs(b.velocity.y) < 0.1 && (Date.now() - b.plugin.created > 2500)) {
                if (isGravityFlipped ? (b.position.y > loseY) : (b.position.y < loseY)) endGame("STACKED!");
            }
        });
    }, 1000);

    function endGame(msg = "GAME OVER") {
        isGameOver = true;
        document.getElementById('end-msg').innerText = msg;
        const panel = document.getElementById('game-over-panel');
        panel.style.display = 'flex';
        
        let lb = JSON.parse(localStorage.getItem('gm_leaderboard') || '[]');
        const isHighScore = lb.length < 5 || gameStats.score > lb[lb.length-1].score;
        
        if(isHighScore) {
            document.getElementById('new-high-score-ui').style.display = 'block';
        }
        renderLeaderboard();
    }

    function renderLeaderboard() {
        let lb = JSON.parse(localStorage.getItem('gm_leaderboard') || '[]');
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = lb.map((entry, i) => `
            <div class="leader-row"><span>#${i+1} ${entry.name}</span><span>${entry.score}</span></div>
        `).join('') || '<div style="text-align:center; opacity:0.5;">No scores yet</div>';
    }

    function saveAndRestart() {
        const nameInput = document.getElementById('name-input');
        if(document.getElementById('new-high-score-ui').style.display === 'block') {
            const name = (nameInput.value || 'AAA').toUpperCase();
            let lb = JSON.parse(localStorage.getItem('gm_leaderboard') || '[]');
            lb.push({ name, score: gameStats.score });
            lb.sort((a,b) => b.score - a.score);
            lb = lb.slice(0, 5);
            localStorage.setItem('gm_leaderboard', JSON.stringify(lb));
        }
        location.reload();
    }

    Events.on(render, 'afterRender', () => {
        if (!isStarted) return;
        const ctx = render.context;
        const loseY = isGravityFlipped ? height - padding : padding;
        const spawnY = isGravityFlipped ? height - 90 : 90;
        ctx.fillStyle = "rgba(56, 189, 248, 0.05)";
        for(let i=0; i<2; i++) ctx.fillRect(Math.random()*width, Math.random()*height, 2, 8);
        if(settings.laser) {
            ctx.setLineDash([5, 15]); ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctx.beginPath(); ctx.moveTo(currentX, spawnY); ctx.lineTo(currentX, isGravityFlipped ? 0 : height); ctx.stroke();
        }
        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined) return;
            ctx.beginPath(); ctx.arc(b.position.x - b.circleRadius*0.3, b.position.y - b.circleRadius*0.3, b.circleRadius*0.2, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();
        });
        ctx.setLineDash([5, 10]); ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.moveTo(0, loseY); ctx.lineTo(width, loseY); ctx.stroke();
    });

    const wallOpts = { isStatic: true, render: { fillStyle: '#1e293b' } };
    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+25, width, 50, wallOpts),
        Bodies.rectangle(width/2, -25, width, 50, wallOpts),
        Bodies.rectangle(-25, height/2, 50, height, wallOpts),
        Bodies.rectangle(width+25, height/2, 50, height, wallOpts)
    ]);
</script>
</body>
</html>
