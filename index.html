<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Merge: Supernova Absolute</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --gold: #fbbf24; --danger: #ef4444; --pink: #f472b6; }
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; user-select: none; }
        
        #ui-layer { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }
        #top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; align-items: center; }
        .menu-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; backdrop-filter: blur(10px); }
        
        #score-container { flex-grow: 1; text-align: center; }
        #score-label { font-size: 2.8em; font-weight: 900; text-shadow: 0 0 20px var(--accent); margin: 0; }
        #best-label { font-size: 0.8em; opacity: 0.6; }
        
        #gravity-ui { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: row; align-items: center; gap: 12px; opacity: 0.8; }
        #gravity-cooldown { width: 100px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #gravity-fill { height: 100%; width: 100%; background: var(--gold); transform: scaleX(1); transform-origin: left; transition: transform 0.1s linear; }
        #g-btn { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); color: var(--gold); background: rgba(0,0,0,0.3); font-weight: 900; cursor: pointer; pointer-events: auto; box-shadow: 0 0 15px var(--gold); }
        
        /* Fixed Comet - Larger Hitbox */
        #comet-hitbox { position: absolute; width: 80px; height: 80px; z-index: 900; pointer-events: auto; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        #comet-visual { position: absolute; width: 30px; height: 30px; background: white; border-radius: 50%; box-shadow: -30px 0 40px var(--accent), 0 0 20px white; }

        .overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        .btn { background: var(--accent); color: white; border: none; padding: 18px 40px; border-radius: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1em; pointer-events: auto; }
        
        #home-screen { z-index: 2100; }
        .toggle-container { margin-top: 20px; display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

        @keyframes pulseG { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="comet-hitbox" onclick="catchComet()"><div id="comet-visual"></div></div>

    <div id="ui-layer">
        <div id="top-bar">
            <button class="menu-btn" onclick="location.reload()">🔄</button>
            <div id="score-container">
                <div id="score-label">0</div>
                <div id="best-label">BEST: <span id="high-score">0</span></div>
            </div>
        </div>
        <div id="gravity-ui">
            <div id="gravity-cooldown"><div id="gravity-fill"></div></div>
            <button id="g-btn" class="charged" onclick="flipGravity()">G</button>
        </div>
    </div>

    <div id="home-screen" class="overlay">
        <h1 style="font-size: 3em; color: var(--accent); margin-bottom: 0;">SUPERNOVA</h1>
        <p style="opacity: 0.7;">Merge the worlds. Control the void.</p>
        <button class="btn" onclick="handleStart()">START MISSION</button>
        <div class="toggle-container">
            <input type="checkbox" id="skip-tutorial">
            <label for="skip-tutorial">Skip Tutorial</label>
        </div>
    </div>

    <div id="tutorial-overlay" class="overlay" style="display:none">
        <div id="step-1" class="step">
            <h2 style="color:var(--accent)">MISSION BRIEFING</h2>
            <p>Drag to aim, tap to drop planets. Merge identical worlds to reach the <b>Core</b>.</p>
            <button class="btn" onclick="nextStep(2)">NEXT</button>
        </div>
        <div id="step-2" class="step" style="display:none">
            <h2 style="color:var(--gold)">GRAVITY ENGINE</h2>
            <p>Your Gravity starts <b>FULL</b>. Use it wisely, or catch a <b>Comet</b> to recharge!</p>
            <button class="btn" onclick="startGame()">LAUNCH</button>
        </div>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none">
        <h2 style="color:var(--danger)">MISSION FAILED</h2>
        <h1 id="final-score" style="font-size: 4em; margin: 0;">0</h1>
        <button class="btn" onclick="location.reload()">RE-TRY</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;
    const engine = Engine.create({ enableSleeping: false });
    const width = window.innerWidth, height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent' } });

    let score = 0, nextLevel = 0, isGameOver = false, isFlipped = false, gameStarted = false;
    let currentX = width/2, gravityCharge = 120000; // Start Full (2 min worth)
    const CHARGE_TIME = 120000;

    const PLANET_DATA = [
        { primary: '#94a3b8', accent: '#475569', spots: true, glow: 'rgba(148,163,184,0.3)' }, // Moon
        { primary: '#22d3ee', accent: '#15803d', spots: true, glow: 'rgba(34,211,238,0.4)' }, // Terra
        { primary: '#f43f5e', accent: '#7f1d1d', spots: true, glow: 'rgba(244,63,94,0.4)' }, // Mars
        { primary: '#fbbf24', accent: '#92400e', stripes: true, glow: 'rgba(251,191,36,0.4)' }, // Gas
        { primary: '#a78bfa', accent: '#5b21b6', stripes: true, glow: 'rgba(167,139,250,0.4)' }, // Purple
        { primary: '#38bdf8', accent: '#1e3a8a', rings: true, glow: 'rgba(56,189,248,0.5)' },   // Saturn
        { primary: '#f472b6', accent: '#ffffff', core: true, glow: 'rgba(244,114,182,0.8)' }   // Core
    ];

    function handleStart() {
        document.getElementById('home-screen').style.display = 'none';
        if (document.getElementById('skip-tutorial').checked) startGame();
        else {
            document.getElementById('tutorial-overlay').style.display = 'flex';
            document.getElementById('step-1').style.display = 'block';
        }
    }

    function nextStep(s) {
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    function startGame() {
        document.getElementById('tutorial-overlay').style.display = 'none';
        document.getElementById('high-score').innerText = localStorage.getItem('gm_best') || 0;
        gameStarted = true;
        Composite.add(engine.world, [
            Bodies.rectangle(5, height/2, 10, height, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width-5, height/2, 10, height, { isStatic: true, render: { visible: false } }),
            Bodies.rectangle(width/2, height+30, width, 60, { isStatic: true }),
            Bodies.rectangle(width/2, -30, width, 60, { isStatic: true })
        ]);
        nextLevel = Math.floor(Math.random() * 3);
        Render.run(render); Runner.run(Runner.create(), engine);
        spawnComet();
    }

    function spawnComet() {
        if (isGameOver) return;
        const hit = document.getElementById('comet-hitbox');
        hit.style.top = (Math.random() * (height - 300) + 150) + 'px';
        hit.style.display = 'block';
        let pos = -100;
        const move = setInterval(() => {
            pos += 7; hit.style.left = pos + 'px';
            if (pos > width + 100 || isGameOver) {
                hit.style.display = 'none'; clearInterval(move);
                if(!isGameOver) setTimeout(spawnComet, Math.random() * 12000 + 8000);
            }
        }, 16);
    }

    function catchComet() { 
        gravityCharge = CHARGE_TIME; 
        document.getElementById('comet-hitbox').style.display = 'none';
    }

    function spawn(x, y, lvl) {
        const r = [20, 32, 45, 60, 80, 105, 135][lvl];
        const b = Bodies.circle(x, y, r, { restitution: 0.4, timestamp: Date.now(), plugin: { level: lvl, merged: false }, render: { visible: false } });
        Composite.add(engine.world, b);
    }

    Events.on(engine, 'collisionActive', (e) => {
        e.pairs.forEach(p => {
            const { bodyA: a, bodyB: b } = p;
            if (a.plugin?.level !== undefined && a.plugin.level === b.plugin?.level && !a.plugin.merged && !b.plugin.merged) {
                if (Date.now() - a.timestamp < 150) return;
                a.plugin.merged = b.plugin.merged = true;
                const lvl = a.plugin.level + 1;
                const mid = { x: (a.position.x + b.position.x)/2, y: (a.position.y + b.position.y)/2 };
                Composite.remove(engine.world, [a, b]);
                if (lvl < 7) spawn(mid.x, mid.y, lvl);
                score += (lvl * 30);
                document.getElementById('score-label').innerText = score;
            }
        });
    });

    function flipGravity() { 
        if (gravityCharge >= CHARGE_TIME) { 
            isFlipped = !isFlipped; engine.gravity.y *= -1; gravityCharge = 0; 
        } 
    }

    Events.on(render, 'afterRender', () => {
        if (!gameStarted || isGameOver) return;
        const ctx = render.context;
        const limitY = isFlipped ? height - 160 : 160;

        // Death Line
        ctx.strokeStyle = 'rgba(239, 68, 68, 0.4)'; ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(width, limitY); ctx.stroke(); ctx.setLineDash([]);

        // Ghost
        ctx.save(); ctx.globalAlpha = 0.2;
        drawPlanet(ctx, currentX, isFlipped ? height - 90 : 90, [20, 32, 45][nextLevel], nextLevel);
        ctx.restore();

        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined) return;
            drawPlanet(ctx, b.position.x, b.position.y, b.circleRadius, b.plugin.level, b.angle);

            const isOver = isFlipped ? (b.position.y > limitY) : (b.position.y < limitY);
            if (isOver && (Date.now() - b.timestamp > 2000)) {
                if (!b.warn) b.warn = Date.now();
                if (Date.now() - b.warn > 3000) {
                    isGameOver = true;
                    document.getElementById('game-over-screen').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                    localStorage.setItem('gm_best', Math.max(score, localStorage.getItem('gm_best') || 0));
                }
            } else b.warn = null;
        });

        if (gravityCharge < CHARGE_TIME) gravityCharge += 16.6; 
        document.getElementById('gravity-fill').style.transform = `scaleX(${Math.min(1, gravityCharge/CHARGE_TIME)})`;
        const gBtn = document.getElementById('g-btn');
        if (gravityCharge >= CHARGE_TIME) { gBtn.classList.add('charged'); gBtn.style.opacity = "1"; }
        else { gBtn.classList.remove('charged'); gBtn.style.opacity = "0.5"; }
    });

    function drawPlanet(ctx, x, y, r, lvl, angle = 0) {
        const data = PLANET_DATA[lvl];
        ctx.save();
        ctx.translate(x, y);

        // 1. Atmosphere Glow (The "Fix")
        const glow = ctx.createRadialGradient(0, 0, r, 0, 0, r * 1.3);
        glow.addColorStop(0, data.glow);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(0, 0, r * 1.3, 0, Math.PI*2); ctx.fill();

        ctx.rotate(angle);
        
        // 2. Main Body with better 3D Sphere shading
        const grad = ctx.createRadialGradient(-r/2.5, -r/2.5, r/10, 0, 0, r);
        grad.addColorStop(0, '#ffffffaa'); // High light
        grad.addColorStop(0.3, data.primary); 
        grad.addColorStop(1, '#000000'); // Deep shadow
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();

        // 3. Texture Overlay
        ctx.clip();
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = data.accent;
        if (data.spots) {
            for(let i=0; i<8; i++) {
                ctx.beginPath(); ctx.arc(Math.cos(i)*r/1.4, Math.sin(i)*r/1.4, r/2.5, 0, Math.PI*2); ctx.fill();
            }
        }
        if (data.stripes) {
            for(let i=-2; i<3; i++) {
                ctx.fillRect(-r, i*r/2.5, r*2, r/6);
            }
        }
        if (data.core) {
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(0, 0, r/2, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        // 4. External Rings (Saturn)
        if (data.rings) {
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = r/6;
            ctx.beginPath();
            ctx.ellipse(x, y, r*1.9, r*0.5, angle + 0.5, 0, Math.PI*2);
            ctx.stroke();
        }
    }

    window.addEventListener('pointermove', (e) => { currentX = Math.max(40, Math.min(width-40, e.clientX)); });
    window.addEventListener('pointerup', (e) => {
        if (!gameStarted || isGameOver || e.target.closest('#gravity-ui, .menu-btn, #comet-hitbox, #home-screen, #tutorial-overlay')) return;
        spawn(currentX, isFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3);
    });
</script>
</body>
</html>
