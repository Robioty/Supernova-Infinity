<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Merge: Final Polish</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --accent: #38bdf8; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #0f172a; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; 
        }
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; justify-content: space-between; pointer-events: none; }
        .menu-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; backdrop-filter: blur(15px); }
        
        .glass-panel { 
            position: absolute; background: rgba(15, 23, 42, 0.95); border: 2px solid var(--accent); 
            border-radius: 20px; padding: 25px; display: none; flex-direction: column; align-items: center;
            z-index: 2000; backdrop-filter: blur(20px); left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 300px; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .theme-opt { flex: 1; padding: 10px; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; text-align: center; cursor: pointer; pointer-events: auto; }
        .theme-opt.active { border-color: var(--accent); background: rgba(56, 189, 248, 0.2); }
        
        #gravity-cooldown { position: fixed; right: 20px; bottom: 100px; width: 8px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 4px; display: none; z-index: 500; }
        #gravity-bar { width: 100%; height: 100%; background: var(--accent); transform-origin: bottom; }
        #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 3000; }
        .flash-anim { animation: flashEffect 0.4s ease-out; }
        @keyframes flashEffect { 0% { opacity: 0.8; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    <div id="ui">
        <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
        <div style="text-align: center;">
            <div id="score-label" style="font-size: 2.5em; font-weight: 900; text-shadow: 0 0 10px rgba(0,0,0,0.5);">0</div>
            <div style="font-size: 0.75em; opacity: 0.8;">BEST: <span id="top-score-ui">0</span></div>
        </div>
        <div style="width:45px"></div>
    </div>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.98); z-index:1500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
        <h1 style="font-size: 3.5em; margin:0; text-align: center; letter-spacing: -2px;">GRAVITY<br><span style="color:var(--accent);">MERGE</span></h1>
        <div style="display:flex; gap:10px; width:100%; margin:30px 0;">
            <div class="theme-opt active" id="theme-classic" onclick="setTheme('classic')">⚪<br>Classic</div>
            <div class="theme-opt" id="theme-cosmos" onclick="setTheme('cosmos')">🪐<br>Planets</div>
            <div class="theme-opt" id="theme-run" onclick="setTheme('run')">🎢<br>Run</div>
        </div>
        <button class="btn" onclick="initGame()" style="padding:20px; font-size: 1.2em;">PLAY NOW</button>
    </div>

    <div id="settings-panel" class="glass-panel">
        <h2 style="margin:0 0 15px 0">PAUSED</h2>
        <button class="btn" onclick="toggleSettings()">RESUME</button>
        <button class="btn" style="background:#ef4444" onclick="location.reload()">RESTART</button>
    </div>

    <div id="game-over-panel" class="glass-panel">
        <h2 style="color:#ef4444; margin:0;">GAME OVER</h2>
        <h1 id="final-score-val" style="font-size: 3em; margin:10px 0">0</h1>
        <button class="btn" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <div id="gravity-cooldown"><div id="gravity-bar"></div></div>
    <button id="g-btn" class="menu-btn" style="position:fixed; right:35px; bottom:100px; width:70px; height:70px; border-radius:50%; border:3px solid var(--accent); display:none; font-weight:900; z-index:1000;" onclick="flipGravity()">G</button>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;
    const engine = Engine.create();
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio } });

    let score = 0, nextLevel = 0, currentX = width/2, isGameOver = false, isPaused = false, isFlipped = false;
    let gravityCharge = 100, lastDrop = 0, comboCount = 0;
    let selectedTheme = 'classic', blackHoles = [], transitMarbles = [];

    const THEMES = {
        classic: { balls: ['#22d3ee', '#f43f5e', '#a3e635', '#94a3b8', '#8b5cf6', '#fbbf24', '#ef4444'], bg: 'radial-gradient(circle at center, #1e293b 0%, #0f172a 100%)' },
        cosmos: { balls: ['#86efac', '#67e8f9', '#f9a8d4', '#c084fc', '#fb923c', '#fde047', '#ffffff'], bg: '#000000' },
        run: { balls: ['#38bdf8', '#f472b6', '#4ade80', '#fb7185', '#818cf8', '#facc15', '#f87171'], bg: '#020617' }
    };

    function setTheme(t) {
        selectedTheme = t;
        document.querySelectorAll('.theme-opt').forEach(el => el.classList.remove('active'));
        document.getElementById('theme-' + t).classList.add('active');
        document.body.style.background = THEMES[t].bg;
    }

    function drawPlanet(ctx, b, r, lvl) {
        const { x, y } = b.position;
        ctx.save();
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
        
        // Planet Atmosphere
        const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
        grad.addColorStop(0, THEMES.cosmos.balls[lvl]); 
        grad.addColorStop(1, '#000');
        ctx.fillStyle = grad; ctx.fillRect(x-r, y-r, r*2, r*2);

        // Clouds (fixed edges by drawing inside clip)
        ctx.translate(x, y); ctx.rotate(Date.now() * 0.0004 * (lvl + 1));
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.setLineDash([r*0.5, r*0.4]); ctx.lineWidth = r*0.2;
        ctx.beginPath(); ctx.arc(0, 0, r*0.6, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
    }

    function spawn(x, y, lvl, isMerge = false) {
        const r = [18, 28, 40, 55, 72, 95, 120][lvl];
        const b = Bodies.circle(x, y, r, { 
            restitution: 0.3, friction: 0.1, 
            render: { fillStyle: THEMES[selectedTheme].balls[lvl], visible: selectedTheme !== 'cosmos' }, 
            plugin: { level: lvl } 
        });
        if (isMerge) Body.setVelocity(b, { x: 0, y: 0 });
        Composite.add(engine.world, b);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined) {
                const lvl = a.plugin.level;
                const mx = (a.position.x + b.position.x) / 2, my = (a.position.y + b.position.y) / 2;
                Composite.remove(engine.world, [a, b]);
                if (lvl === 6) { 
                    if (selectedTheme === 'cosmos') blackHoles.push({ x: mx, y: my, r: 140, life: 1.0 });
                    score += 1000; triggerFlash(); 
                } else { 
                    score += [2,5,10,20,40,80][lvl] * (++comboCount); 
                    spawn(mx, my, lvl + 1, true); 
                }
                document.getElementById('score-label').innerText = score.toLocaleString();
            }
        });
    });

    Events.on(render, 'afterRender', () => {
        if (isPaused || isGameOver) return;
        const ctx = render.context;
        const limitY = isFlipped ? height - 150 : 150;
        let danger = false;

        // Death Line
        ctx.setLineDash([10, 10]); ctx.lineWidth = 4;
        ctx.strokeStyle = danger ? `rgba(239, 68, 68, ${0.5 + Math.sin(Date.now()*0.01)*0.5})` : 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(width, limitY); ctx.stroke(); ctx.setLineDash([]);

        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined || b.inTransit) return;
            if (selectedTheme === 'cosmos') drawPlanet(ctx, b, b.circleRadius, b.plugin.level);
            if ((!isFlipped && b.position.y < limitY) || (isFlipped && b.position.y > limitY)) {
                danger = true;
                if (!b.warn) b.warn = Date.now();
                if (Date.now() - b.warn > 3500) { isGameOver = true; document.getElementById('game-over-panel').style.display = 'flex'; document.getElementById('final-score-val').innerText = score.toLocaleString(); }
            } else b.warn = null;
        });

        // Marble Run: One-Way Relief Valve
        if (selectedTheme === 'run') {
            const intakeY = isFlipped ? 80 : height - 80;
            ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
            ctx.beginPath(); ctx.arc(60, intakeY, 45, 0, Math.PI*2); ctx.fill(); // Single Intake
            
            Composite.allBodies(engine.world).forEach(b => {
                if (b.plugin.level <= 1 && !b.inTransit && Math.abs(b.position.y - intakeY) < 45 && b.position.x < 100) {
                    b.inTransit = true; b.isSensor = true;
                    transitMarbles.push({ body: b, start: {x: b.position.x, y: b.position.y}, end: {x: width-60, y: isFlipped ? height-100 : 100}, progress: 0 });
                }
            });

            transitMarbles = transitMarbles.filter(m => {
                m.progress += 0.012;
                const curve = Math.sin(m.progress * Math.PI) * 180;
                Body.setPosition(m.body, { x: m.start.x + (m.end.x - m.start.x) * m.progress, y: m.start.y + (m.end.y - m.start.y) * m.progress + (isFlipped ? curve : -curve) });
                ctx.globalAlpha = 0.2; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 40; ctx.beginPath();
                ctx.moveTo(m.start.x, m.start.y); ctx.quadraticCurveTo(width/2, height/2, m.end.x, m.end.y); ctx.stroke(); ctx.globalAlpha = 1;
                if (m.progress >= 1) { m.body.inTransit = false; m.body.isSensor = false; score += 100; return false; }
                return true;
            });
        }

        // Black Holes
        blackHoles = blackHoles.filter(bh => {
            bh.life -= 0.0007; bh.r *= 0.9997;
            const g = ctx.createRadialGradient(bh.x, bh.y, 0, bh.x, bh.y, bh.r);
            g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#a855f7'); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bh.x, bh.y, bh.r, 0, Math.PI*2); ctx.fill();
            Composite.allBodies(engine.world).forEach(b => {
                if(!b.isStatic) {
                    const d = Vector.magnitude(Vector.sub(b.position, bh));
                    if(d < bh.r * 2.5) Body.applyForce(b, b.position, Vector.mult(Vector.normalise(Vector.sub(b.position, bh)), 0.009 * (1 - d/(bh.r*2.5))));
                }
            });
            return bh.life > 0;
        });

        if (gravityCharge < 100) gravityCharge += 0.45;
        document.getElementById('gravity-bar').style.transform = `scaleY(${gravityCharge/100})`;
        const sy = isFlipped ? height - 90 : 90;
        ctx.globalAlpha = 0.5; ctx.fillStyle = THEMES[selectedTheme].balls[nextLevel];
        ctx.beginPath(); ctx.arc(currentX, sy, [18, 28, 40][nextLevel], 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
    });

    window.addEventListener('pointermove', (e) => currentX = Math.max(40, Math.min(width-40, e.clientX)));
    window.addEventListener('pointerup', (e) => {
        if (e.target.closest('.menu-btn') || isPaused || isGameOver || Date.now() - lastDrop < 750) return;
        spawn(currentX, isFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3); lastDrop = Date.now();
    });

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-btn').style.display = 'block';
        document.getElementById('gravity-cooldown').style.display = 'block';
        Render.run(render); Runner.run(Runner.create(), engine);
        const best = localStorage.getItem('gm_best_final_v2') || 0;
        document.getElementById('top-score-ui').innerText = Number(best).toLocaleString();
    }

    function flipGravity() { if (gravityCharge >= 100) { isFlipped = !isFlipped; engine.gravity.y *= -1; gravityCharge = 0; } }
    function toggleSettings() { 
        isPaused = !isPaused; 
        engine.timing.timeScale = isPaused ? 0 : 1; 
        document.getElementById('settings-panel').style.display = isPaused ? 'flex' : 'none'; 
    }
    function triggerFlash() { const f = document.getElementById('flash-overlay'); f.classList.remove('flash-anim'); void f.offsetWidth; f.classList.add('flash-anim'); }

    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+25, width, 50, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(width/2, -25, width, 50, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(-25, height/2, 50, height, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(width+25, height/2, 50, height, { isStatic: true, render: { visible: false } })
    ]);
</script>
</body>
</html>
