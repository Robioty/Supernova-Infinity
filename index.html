<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Merge: The Definitive Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg-hue: 222; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: hsl(var(--bg-hue), 47%, 11%); font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; 
            transition: background 1.5s ease;
        }
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 1000; display: flex; align-items: center; gap: 10px; pointer-events: none; }
        .menu-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 10px; border-radius: 12px; cursor: pointer; pointer-events: auto; backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; }
        
        #next-preview { width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); position: relative; overflow: hidden; pointer-events: none; }
        #next-ball-inner { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); border-radius: 50%; transition: all 0.3s ease; }

        #score-container { flex-grow: 1; text-align: center; }
        #score-label { font-size: 2.2em; font-weight: 900; line-height: 1; }
        
        .glass-panel { 
            position: absolute; background: rgba(15, 23, 42, 0.98); border: 2px solid var(--accent); 
            border-radius: 20px; padding: 25px; display: none; flex-direction: column; align-items: center;
            z-index: 2000; backdrop-filter: blur(20px); left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 280px; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }
        .btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        
        /* Combo Text */
        .combo-popup { position: absolute; font-weight: 900; pointer-events: none; z-index: 30; animation: floatUp 0.8s ease-out forwards; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.2); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }

        /* Progress Bar */
        #exp-bar-wrap { position: fixed; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.05); z-index: 1001; }
        #exp-bar-fill { height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.5s ease; }

        #gravity-cooldown { position: fixed; right: 20px; bottom: 100px; width: 8px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 4px; display: none; overflow: hidden; }
        #gravity-bar { width: 100%; height: 100%; background: #fbbf24; transform-origin: bottom; }
        #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 3000; }
        .flash-anim { animation: flashEffect 0.4s ease-out; }
        @keyframes flashEffect { 0% { opacity: 0.7; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    <div id="ui">
        <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
        <div id="next-preview"><div id="next-ball-inner"></div></div>
        <div id="score-container">
            <div id="score-label">0</div>
            <div style="font-size: 0.7em; opacity: 0.6;">BEST: <span id="top-score-ui">0</span></div>
        </div>
    </div>

    <div id="exp-bar-wrap"><div id="exp-bar-fill"></div></div>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.98); z-index:1500; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
        <h1 style="font-size: 3.5em; margin:0; text-align: center;">GRAVITY<br><span style="color:var(--accent);">MERGE</span></h1>
        <div style="display:flex; gap:10px; width:100%; margin:30px 0;">
            <div class="theme-opt active" id="theme-classic" onclick="setTheme('classic')">⚪<br>Classic</div>
            <div class="theme-opt" id="theme-cosmos" onclick="setTheme('cosmos')">🪐<br>Planets</div>
            <div class="theme-opt" id="theme-run" onclick="setTheme('run')">🎢<br>Glass</div>
        </div>
        <button class="btn" onclick="initGame()" style="padding:18px;">START GAME</button>
    </div>

    <div id="settings-panel" class="glass-panel">
        <h2 style="margin:0 0 15px 0">PAUSED</h2>
        <button class="btn" onclick="toggleSettings()">RESUME</button>
        <button class="btn" style="background:#ef4444" onclick="location.reload()">RESTART</button>
    </div>

    <div id="game-over-panel" class="glass-panel">
        <h2 style="color:#ef4444; margin:0;">GAME OVER</h2>
        <h1 id="final-score-val" style="font-size: 3em; margin:10px 0">0</h1>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div id="gravity-cooldown"><div id="gravity-bar"></div></div>
    <button id="g-btn" class="menu-btn" style="position:fixed; right:35px; bottom:100px; width:70px; height:70px; border-radius:50%; border:3px solid #fbbf24; display:none; font-weight:900; color:#fbbf24;" onclick="flipGravity()">G</button>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;
    const engine = Engine.create();
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio } });

    let score = 0, nextLevel = 0, currentX = width/2, isGameOver = false, isPaused = false, isFlipped = false;
    let gravityCharge = 100, lastDrop = 0, comboCount = 0, lastMergeTime = 0, selectedTheme = 'classic';
    let blackHoles = [], transitMarbles = [], shards = [], trails = [];

    const THEMES = {
        classic: { balls: ['#22d3ee', '#f43f5e', '#a3e635', '#94a3b8', '#8b5cf6', '#fbbf24', '#ef4444'], bgHue: 222 },
        cosmos: { balls: ['#86efac', '#67e8f9', '#f9a8d4', '#c084fc', '#fb923c', '#fde047', '#ffffff'], bgHue: 250 },
        run: { balls: ['#38bdf8', '#f472b6', '#4ade80', '#fb7185', '#818cf8', '#facc15', '#f87171'], bgHue: 235 }
    };

    function setTheme(t) {
        selectedTheme = t;
        document.querySelectorAll('.theme-opt').forEach(el => el.classList.remove('active'));
        document.getElementById('theme-' + t).classList.add('active');
        updateUI();
    }

    function updateUI() {
        const nextColor = THEMES[selectedTheme].balls[nextLevel];
        const nextSize = [12, 18, 24][nextLevel];
        const inner = document.getElementById('next-ball-inner');
        inner.style.backgroundColor = nextColor;
        inner.style.width = nextSize + 'px';
        inner.style.height = nextSize + 'px';
        inner.style.boxShadow = `0 0 10px ${nextColor}`;
        document.body.style.setProperty('--bg-hue', THEMES[selectedTheme].bgHue + Math.floor(score/150));
    }

    function showPopup(x, y, val, color) {
        const txt = document.createElement('div');
        txt.className = 'combo-popup';
        txt.style.left = x + 'px'; txt.style.top = y + 'px';
        txt.style.color = color;
        txt.innerHTML = `+${val}${comboCount > 1 ? '<br><small>x'+comboCount+'</small>' : ''}`;
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 800);
    }

    function spawn(x, y, lvl, isMerge = false) {
        const r = [18, 28, 40, 55, 72, 95, 120][lvl];
        const b = Bodies.circle(x, y, r, { restitution: 0.3, friction: 0.1, render: { visible: selectedTheme === 'classic', fillStyle: THEMES[selectedTheme].balls[lvl] }, plugin: { level: lvl } });
        if (isMerge) Body.setVelocity(b, { x: 0, y: 0 });
        Composite.add(engine.world, b);
        
        const prog = ((lvl + 1) / 7) * 100;
        document.getElementById('exp-bar-fill').style.width = prog + "%";
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined) {
                const lvl = a.plugin.level;
                const now = Date.now();
                comboCount = (now - lastMergeTime < 1000) ? comboCount + 1 : 1;
                lastMergeTime = now;

                const baseScore = [2, 5, 10, 20, 40, 80, 150][lvl];
                const totalAdd = baseScore * comboCount;
                score += totalAdd;
                document.getElementById('score-label').innerText = score.toLocaleString();

                const mx = (a.position.x + b.position.x) / 2, my = (a.position.y + b.position.y) / 2;
                showPopup(mx, my, totalAdd, THEMES[selectedTheme].balls[lvl]);
                
                Composite.remove(engine.world, [a, b]);
                if (lvl === 6) { 
                    if (selectedTheme === 'cosmos') blackHoles.push({ x: mx, y: my, r: 150, life: 1.0 });
                    score += 1000; triggerFlash(); 
                } else { spawn(mx, my, lvl + 1, true); }
                updateUI();
            }
        });
    });

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        if (isPaused) return;

        const limitY = isFlipped ? height - 150 : 150;
        const spawnY = isFlipped ? height - 90 : 90;
        let isDanger = false;

        // Laser Aiming Sight
        ctx.setLineDash([5, 15]); ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.beginPath(); ctx.moveTo(currentX, spawnY); ctx.lineTo(currentX, isFlipped ? 0 : height); ctx.stroke();
        ctx.setLineDash([]);

        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined || b.inTransit) return;
            if (Vector.magnitude(b.velocity) > 2.5) trails.push({ x: b.position.x, y: b.position.y, r: b.circleRadius * 0.7, life: 0.4, color: THEMES[selectedTheme].balls[b.plugin.level] });

            if (selectedTheme === 'cosmos') {
                const { x, y } = b.position; const r = b.circleRadius;
                ctx.save(); ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();
                ctx.fillStyle = THEMES.cosmos.balls[b.plugin.level]; ctx.fillRect(x-r, y-r, r*2, r*2);
                const grad = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.1, x, y, r);
                grad.addColorStop(0, 'rgba(255,255,255,0.4)'); grad.addColorStop(1, 'rgba(0,0,0,0.8)');
                ctx.fillStyle = grad; ctx.fillRect(x-r, y-r, r*2, r*2); ctx.restore();
            } else if (selectedTheme === 'run') {
                const { x, y } = b.position; const r = b.circleRadius; const color = THEMES.run.balls[b.plugin.level];
                const g = ctx.createRadialGradient(x-r*0.3, y-r*0.3, r*0.2, x, y, r);
                g.addColorStop(0, color); g.addColorStop(1, 'rgba(0,0,0,0.7)');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(x-r*0.4, y-r*0.4, r*0.15, 0, Math.PI*2); ctx.fill();
            } else { // Classic Gloss
                ctx.beginPath(); ctx.arc(b.position.x - b.circleRadius*0.3, b.position.y - b.circleRadius*0.3, b.circleRadius*0.15, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.25)"; ctx.fill();
            }
            
            if (!isGameOver && ((!isFlipped && b.position.y < limitY) || (isFlipped && b.position.y > limitY))) {
                isDanger = true;
                if (!b.warn) b.warn = Date.now();
                if (Date.now() - b.warn > 3500) { 
                    isGameOver = true;
                    Composite.allBodies(engine.world).forEach(body => { if(!body.isStatic) for(let i=0; i<8; i++) shards.push({ x: body.position.x, y: body.position.y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, r: Math.random()*5, color: THEMES[selectedTheme].balls[body.plugin.level || 0], life: 1.0 }); });
                    document.getElementById('game-over-panel').style.display = 'flex';
                    document.getElementById('final-score-val').innerText = score.toLocaleString();
                }
            } else b.warn = null;
        });

        trails = trails.filter(t => { t.life -= 0.04; ctx.globalAlpha = t.life * 0.2; ctx.fillStyle = t.color; ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill(); return t.life > 0; });
        ctx.globalAlpha = 1;

        shards = shards.filter(s => { s.x += s.vx; s.y += s.vy; s.life -= 0.02; ctx.fillStyle = s.color; ctx.globalAlpha = s.life; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); return s.life > 0; });

        // 60-second Cooldown
        if (gravityCharge < 100) gravityCharge += (100 / (60 * 60)); 
        document.getElementById('gravity-bar').style.transform = `scaleY(${gravityCharge/100})`;
        document.getElementById('gravity-bar').style.background = gravityCharge >= 100 ? '#fbbf24' : '#475569';
        
        if (!isGameOver) {
            ctx.setLineDash([8, 8]); ctx.strokeStyle = isDanger ? '#ef4444' : 'rgba(255,255,255,0.15)';
            ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(width, limitY); ctx.stroke(); ctx.setLineDash([]);
            ctx.globalAlpha = 0.3; ctx.fillStyle = THEMES[selectedTheme].balls[nextLevel];
            ctx.beginPath(); ctx.arc(currentX, spawnY, [18, 28, 40][nextLevel], 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
        }
    });

    window.addEventListener('pointermove', (e) => currentX = Math.max(40, Math.min(width-40, e.clientX)));
    window.addEventListener('pointerup', (e) => {
        if (e.target.closest('.menu-btn') || isPaused || isGameOver || Date.now() - lastDrop < 700) return;
        spawn(currentX, isFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3); lastDrop = Date.now(); updateUI();
    });

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-btn').style.display = 'block';
        document.getElementById('gravity-cooldown').style.display = 'block';
        Render.run(render); Runner.run(Runner.create(), engine);
        document.getElementById('top-score-ui').innerText = (localStorage.getItem('gm_top') || 0);
        updateUI();
    }

    function toggleSettings() { isPaused = !isPaused; engine.timing.timeScale = isPaused ? 0 : 1; document.getElementById('settings-panel').style.display = isPaused ? 'flex' : 'none'; }
    function flipGravity() { if (gravityCharge >= 100) { isFlipped = !isFlipped; engine.gravity.y *= -1; gravityCharge = 0; } }
    function triggerFlash() { const f = document.getElementById('flash-overlay'); f.classList.remove('flash-anim'); void f.offsetWidth; f.classList.add('flash-anim'); }

    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+25, width, 50, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(width/2, -25, width, 50, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(-25, height/2, 50, height, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(width+25, height/2, 50, height, { isStatic: true, render: { visible: false } })
    ]);
</script>
</body>
</html>
