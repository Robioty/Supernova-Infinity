<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Merge Glitch-Proof</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #0f172a; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            font-family: 'Segoe UI', sans-serif; touch-action: none; position: fixed; color: white; 
        }

        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 99; transition: opacity 0.1s; }
        
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 10; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .ui-group { display: flex; gap: 10px; align-items: flex-start; }
        .menu-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; font-size: 1.2em; backdrop-filter: blur(10px); }
        
        #progress-wrapper { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); z-index: 20; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #38bdf8, #f43f5e); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .floating-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 30; animation: bounceUp 1.2s ease-out forwards; font-size: 1.8em; text-shadow: 0 4px 8px rgba(0,0,0,0.8); }
        @keyframes bounceUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(-20px) scale(1.3); opacity: 1; } 100% { transform: translateY(-70px) scale(1); opacity: 0; } }

        .glass-panel { 
            position: absolute; background: rgba(15, 23, 42, 0.98); border: 1px solid rgba(56, 189, 248, 0.3); 
            border-radius: 20px; padding: 20px; display: none; flex-direction: column; align-items: center;
            z-index: 100; backdrop-filter: blur(20px); left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 280px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        
        .toggle { width: 44px; height: 22px; background: #334155; border-radius: 20px; position: relative; cursor: pointer; pointer-events: auto; }
        .toggle.on { background: #38bdf8; }
        .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .toggle.on::after { left: 24px; }

        .btn { background: #38bdf8; color: white; border: none; padding: 14px 30px; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; pointer-events: auto; }
        canvas { display: block; margin: 0 auto; background: transparent !important; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="ui">
        <div class="ui-group">
            <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
            <div>
                <div id="score-label" style="font-size: 2.5em; font-weight: 900; line-height: 1;">0</div>
                <div style="font-size: 0.7em; opacity: 0.6; font-weight: bold;">BEST: <span id="high-score-ui">0</span></div>
            </div>
        </div>
        <button class="menu-btn" id="pause-btn" onclick="togglePause()">⏸</button>
    </div>

    <div id="settings-panel" class="glass-panel">
        <h3 style="margin-top:0;">SETTINGS</h3>
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <span>Audio</span><div id="audio-toggle" class="toggle on" onclick="updateSetting('audio')"></div>
        </div>
        <button class="btn" onclick="toggleSettings()">CLOSE</button>
        <button class="btn" style="background:#ef4444" onclick="location.reload()">RESTART</button>
    </div>

    <div id="game-over-panel" class="glass-panel">
        <h2 id="end-msg">GAME OVER</h2>
        <div id="new-high-score-ui" style="display:none; text-align:center;">
            <input type="text" id="name-input" maxlength="3" placeholder="AAA" style="background:rgba(255,255,255,0.1); border:2px solid #38bdf8; color:white; text-align:center; font-size:1.8em; width:120px; border-radius:12px; margin-bottom:15px; outline:none;">
        </div>
        <div id="lb-list-end" style="width:100%;"></div>
        <button class="btn" onclick="saveAndRestart()">PLAY AGAIN</button>
    </div>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.98); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 20px;">
        <h1 style="font-size: 4em; text-align:center; line-height: 0.9;">GRAVITY<br><span style="color:#38bdf8">MERGE</span></h1>
        <button class="btn" onclick="initGame()" style="width:240px; padding:22px; font-size: 1.4em;">START GAME</button>
    </div>

    <div id="progress-wrapper"><div id="progress-fill"></div></div>
    
    <div id="side-controls">
        <button id="g-toggle" class="menu-btn" style="display:none; position:fixed; right:20px; bottom:100px; width:60px; height:60px; border-radius:50%; border:3px solid #38bdf8;" onclick="flipGravity()">G</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
    const engine = Engine.create();
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent' } });

    let settings = { audio: true };
    let gameStats = { score: 0, lastMergeTime: 0 };
    let nextLevel = 0, currentX = width/2, isGameOver = false, isPaused = false, isStarted = false, isGravityFlipped = false;
    let lastDropTime = 0;
    const DROP_DELAY = 850;

    const BALL_TYPES = [
        { r: 15, col: '#22d3ee', score: 2 }, { r: 25, col: '#f43f5e', score: 5 },
        { r: 35, col: '#a3e635', score: 10 }, { r: 48, col: '#94a3b8', score: 20 },
        { r: 65, col: '#8b5cf6', score: 40 }, { r: 85, col: '#fbbf24', score: 80 },
        { r: 110, col: '#ef4444', score: 150 }, { r: 140, col: '#0f172a', score: 1000 }
    ];

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-btn').innerText = isPaused ? "▶" : "⏸";
        engine.timing.timeScale = isPaused ? 0 : 1;
    }

    function spawn(x, y, lvl, isMerge = false) {
        const t = BALL_TYPES[lvl];
        const safeX = Math.max(t.r + 10, Math.min(width - t.r - 10, x));
        const b = Bodies.circle(safeX, y, t.r, { 
            restitution: 0.1, friction: 0.3, 
            render: { fillStyle: t.col }, plugin: { level: lvl } 
        });
        if (isMerge) Body.setVelocity(b, { x: 0, y: 0 });
        Composite.add(engine.world, b);
    }

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-toggle').style.display = 'block';
        isStarted = true;
        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    function flipGravity() {
        if (isGameOver || isPaused) return;
        engine.gravity.y *= -1; 
        isGravityFlipped = !isGravityFlipped;
        // Anti-freeze: briefly relax collisions to let objects shift
        Composite.allBodies(engine.world).forEach(b => {
            if(!b.isStatic) Body.setVelocity(b, {x: (Math.random()-0.5)*2, y: isGravityFlipped ? 5 : -5});
        });
    }

    Events.on(engine, 'collisionStart', (e) => {
        if (isPaused) return;
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined) {
                const lvl = a.plugin.level + 1;
                if (lvl >= BALL_TYPES.length) return;
                
                gameStats.score += BALL_TYPES[a.plugin.level].score;
                document.getElementById('score-label').innerText = gameStats.score.toLocaleString();
                
                const mx = (a.position.x + b.position.x) / 2;
                const my = (a.position.y + b.position.y) / 2;
                Composite.remove(engine.world, [a, b]);
                setTimeout(() => spawn(mx, my, lvl, true), 50);
            }
        });
    });

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        if (!isStarted || isGameOver) return;

        const sy = isGravityFlipped ? height - 90 : 90;
        const elapsed = Date.now() - lastDropTime;
        const ready = Math.min(1, elapsed / DROP_DELAY);

        // Preview
        ctx.globalAlpha = ready < 1 ? 0.1 : 0.4;
        ctx.fillStyle = BALL_TYPES[nextLevel].col;
        ctx.beginPath(); ctx.arc(currentX, sy, BALL_TYPES[nextLevel].r, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;

        // Anti-Stuck Check
        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined) return;
            // Force back into bounds if glitched
            if (b.position.x < 0) Body.setPosition(b, {x: 20, y: b.position.y});
            if (b.position.x > width) Body.setPosition(b, {x: width-20, y: b.position.y});
            
            // Death check
            const limit = isGravityFlipped ? height - 150 : 150;
            if ((!isGravityFlipped && b.position.y < limit) || (isGravityFlipped && b.position.y > limit)) {
                if (!b.plugin.warn) b.plugin.warn = Date.now();
                if (Date.now() - b.plugin.warn > 3000) endGame();
            } else { b.plugin.warn = null; }
        });
    });

    function endGame() {
        isGameOver = true;
        document.getElementById('game-over-panel').style.display = 'flex';
    }

    window.addEventListener('pointermove', (e) => { currentX = Math.max(40, Math.min(width - 40, e.clientX)); });
    window.addEventListener('pointerup', (e) => {
        if (!isStarted || isGameOver || isPaused || e.target.closest('.menu-btn')) return;
        if (Date.now() - lastDropTime < DROP_DELAY) return;
        spawn(currentX, isGravityFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3);
        lastDropTime = Date.now();
    });

    // Static Walls with a bit of "bounciness" to prevent sticking
    const wallOpts = { isStatic: true, restitution: 0.5, render: { visible: false } };
    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+25, width, 50, wallOpts), 
        Bodies.rectangle(width/2, -25, width, 50, wallOpts),
        Bodies.rectangle(-25, height/2, 50, height, wallOpts), 
        Bodies.rectangle(width+25, height/2, 50, height, wallOpts)
    ]);
</script>
</body>
</html>
