<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gravity Merge Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --gold: #fbbf24; }
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        #ui { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 100; display: flex; align-items: center; pointer-events: none; }
        .menu-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 12px; cursor: pointer; pointer-events: auto; backdrop-filter: blur(10px); }
        #score-container { flex-grow: 1; text-align: center; }
        #score-label { font-size: 2.5em; font-weight: 900; }
        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.98); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 220px; font-size: 1.1em; margin-top: 10px; }
        .theme-selector { display: flex; gap: 10px; margin: 20px 0; pointer-events: auto; }
        .theme-opt { padding: 10px; border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; cursor: pointer; background: rgba(255,255,255,0.05); width: 65px; font-size: 0.8em; }
        .theme-opt.active { border-color: var(--accent); background: rgba(56,189,248,0.2); }
        .leaderboard { width: 100%; max-width: 280px; margin-top: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; font-size: 0.9em; }
        .score-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        input { background: rgba(255,255,255,0.1); border: 1px solid var(--accent); color: white; padding: 12px; border-radius: 10px; width: 200px; text-align: center; margin-bottom: 10px; }
        .combo-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 30; animation: popUp 0.7s ease-out forwards; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 0; } 20% { opacity: 1; transform: scale(1.2); } 100% { transform: translateY(-40px); opacity: 0; } }
        #gravity-cooldown { position: fixed; right: 20px; bottom: 100px; width: 6px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 3px; display: none; }
        #gravity-fill { width: 100%; height: 100%; background: var(--gold); transform-origin: bottom; transition: transform 0.1s linear; }
    </style>
</head>
<body>
    <div id="ui">
        <button class="menu-btn" onclick="togglePause()">⚙️</button>
        <div id="score-container">
            <div id="score-label">0</div>
            <div style="font-size: 0.7em; opacity: 0.6;">BEST: <span id="best-score">0</span></div>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 style="font-size: 2.5em; margin: 0;">GRAVITY <span style="color:var(--accent)">MERGE</span></h1>
        <div class="theme-selector">
            <div class="theme-opt active" onclick="setTheme('classic', this)">⚪<br>Classic</div>
            <div class="theme-opt" onclick="setTheme('cosmos', this)">🪐<br>Planets</div>
            <div class="theme-opt" onclick="setTheme('glass', this)">💎<br>Glass</div>
        </div>
        <button class="btn" onclick="startGame()">START GAME</button>
        <div class="leaderboard" id="main-leaderboard"></div>
    </div>

    <div id="game-over-screen" class="overlay" style="display:none">
        <h2 style="color:#ef4444">GAME OVER</h2>
        <h1 id="final-score" style="font-size: 3em; margin: 5px 0;">0</h1>
        <div id="name-input-area">
            <input type="text" id="player-name" placeholder="YOUR NAME" maxlength="10">
            <button class="btn" onclick="submitScore()">SUBMIT TO BOARD</button>
        </div>
        <button class="btn" style="background:#475569" onclick="location.reload()">RESTART</button>
    </div>

    <div id="gravity-cooldown"><div id="gravity-fill"></div></div>
    <button id="g-btn" class="menu-btn" style="position:fixed; right:25px; bottom:100px; width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); color:var(--gold); font-weight:bold; display:none;" onclick="flipGravity()">G</button>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const engine = Engine.create();
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent' } });

    let score = 0, nextLevel = 0, isGameOver = false, isPaused = false, isFlipped = false;
    let currentX = width/2, gravityCharge = 100, lastDrop = 0, combo = 1, lastMerge = 0, selectedTheme = 'classic';

    const THEMES = {
        classic: ['#22d3ee', '#f43f5e', '#a3e635', '#94a3b8', '#8b5cf6', '#fbbf24', '#ef4444'],
        cosmos: ['#86efac', '#67e8f9', '#f9a8d4', '#c084fc', '#fb923c', '#fde047', '#ffffff'],
        glass: ['rgba(56,189,248,0.5)', 'rgba(244,114,182,0.5)', 'rgba(74,222,128,0.5)', 'rgba(148,163,184,0.5)', 'rgba(167,139,250,0.5)', 'rgba(250,204,21,0.5)', 'rgba(248,113,113,0.5)']
    };

    function setTheme(t, el) {
        selectedTheme = t;
        document.querySelectorAll('.theme-opt').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
    }

    function initLeaderboard() {
        const scores = JSON.parse(localStorage.getItem('gm_scores') || '[]');
        const html = scores.slice(0, 5).map((s, i) => `
            <div class="score-entry"><span>${i+1}. ${s.name}</span><span>${s.score}</span></div>
        `).join('') || 'No scores yet';
        document.getElementById('main-leaderboard').innerHTML = `<b>LEADERBOARD</b><br>${html}`;
    }

    function submitScore() {
        const name = document.getElementById('player-name').value || 'PLAYER';
        let scores = JSON.parse(localStorage.getItem('gm_scores') || '[]');
        scores.push({ name, score });
        scores.sort((a, b) => b.score - a.score);
        localStorage.setItem('gm_scores', JSON.stringify(scores.slice(0, 10)));
        document.getElementById('name-input-area').innerHTML = '<h4>SCORE SAVED!</h4>';
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('g-btn').style.display = 'block';
        document.getElementById('gravity-cooldown').style.display = 'block';
        document.getElementById('best-score').innerText = localStorage.getItem('gm_best') || 0;
        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    function spawn(x, y, lvl) {
        const r = [18, 28, 40, 55, 72, 95, 120][lvl];
        const b = Bodies.circle(x, y, r, { restitution: 0.3, render: { fillStyle: THEMES[selectedTheme][lvl] }, plugin: { level: lvl } });
        Composite.add(engine.world, b);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined) {
                const lvl = a.plugin.level + 1;
                if (lvl >= 7) return;
                const now = Date.now();
                combo = (now - lastMerge < 800) ? combo + 1 : 1;
                lastMerge = now;
                const points = [2, 5, 10, 20, 40, 80, 150][a.plugin.level] * combo;
                score += points;
                document.getElementById('score-label').innerText = score;
                const mx = (a.position.x + b.position.x)/2, my = (a.position.y + b.position.y)/2;
                Composite.remove(engine.world, [a, b]);
                spawn(mx, my, lvl);
                
                const txt = document.createElement('div');
                txt.className = 'combo-text';
                txt.style.left = mx + 'px'; txt.style.top = my + 'px';
                txt.innerHTML = `+${points}${combo > 1 ? ' x'+combo : ''}`;
                document.body.appendChild(txt);
                setTimeout(() => txt.remove(), 700);
            }
        });
    });

    function flipGravity() {
        if (gravityCharge < 100) return;
        isFlipped = !isFlipped; engine.gravity.y *= -1; gravityCharge = 0;
    }

    Events.on(render, 'afterRender', () => {
        if (isPaused || isGameOver) return;
        const ctx = render.context;
        if (gravityCharge < 100) {
            gravityCharge += 0.25;
            document.getElementById('gravity-fill').style.transform = `scaleY(${gravityCharge/100})`;
        }
        const limitY = isFlipped ? height - 150 : 150;
        Composite.allBodies(engine.world).forEach(b => {
            if (b.isStatic || b.plugin.level === undefined) return;
            if (((!isFlipped && b.position.y < limitY) || (isFlipped && b.position.y > limitY)) && Math.abs(b.velocity.y) < 0.2) {
                if (!b.warn) b.warn = Date.now();
                if (Date.now() - b.warn > 3000) {
                    isGameOver = true;
                    document.getElementById('game-over-screen').style.display = 'flex';
                    document.getElementById('final-score').innerText = score;
                    if (score > (localStorage.getItem('gm_best') || 0)) localStorage.setItem('gm_best', score);
                }
            } else b.warn = null;
        });
    });

    window.addEventListener('pointermove', (e) => currentX = Math.max(40, Math.min(width-40, e.clientX)));
    window.addEventListener('pointerup', () => {
        if (isPaused || isGameOver || Date.now() - lastDrop < 600 || document.querySelector('.overlay:not([style*="none"])')) return;
        spawn(currentX, isFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3);
        lastDrop = Date.now();
    });

    function togglePause() {
        isPaused = !isPaused; engine.timing.timeScale = isPaused ? 0 : 1;
        document.getElementById('game-over-screen').style.display = isPaused ? 'flex' : 'none';
        if (isPaused) document.getElementById('name-input-area').style.display = 'none';
    }

    initLeaderboard();
    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+25, width, 50, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(width/2, -25, width, 50, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(-25, height/2, 50, height, { isStatic: true, render: { visible: false } }),
        Bodies.rectangle(width+25, height/2, 50, height, { isStatic: true, render: { visible: false } })
    ]);
</script>
</body>
</html>
