<!-- SUPERNOVA v5.0 (Optimised + Upgrades + Revive) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Supernova v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
/* (same styles as before, unchanged for brevity) */
body { margin:0; overflow:hidden; background:#010206; color:white; font-family:sans-serif;}
.btn { padding:12px; margin:5px; background:#38bdf8; border:none; border-radius:10px; color:white; font-weight:bold;}
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center;}
</style>
</head>

<body>

<div id="home" class="overlay">
<h1>SUPERNOVA</h1>
<button class="btn" onclick="startGame()">PLAY</button>
</div>

<div id="revive" class="overlay" style="display:none">
<h2>REVIVE?</h2>
<button class="btn" onclick="revive()">✨ 100</button>
<button class="btn" onclick="endGame()">END</button>
</div>

<canvas id="game"></canvas>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

let engine, render, runner;
let activeBodies = [];
let particles = [];

let score = 0;
let dust = 0;
let sessionDust = 0;
let dropCount = 0;

let gravityCharge = 120000;
let CHARGE_TIME = 120000;

let audioCtx;
let lastDrop = 0;
let reviveUsed = false;

const MAX_PARTICLES = 300;
const MERGE_PULL = 0.0005;

const PLANETS = [
 {r:16},{r:24},{r:34},{r:45},{r:59},{r:78},{r:99},{r:120}
];

function initAudio(){
 if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
window.addEventListener("pointerdown", initAudio, {once:true});

function play(freq){
 if(!audioCtx) return;
 const o = audioCtx.createOscillator();
 const g = audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value = freq;
 g.gain.value = 0.05;
 o.start();
 o.stop(audioCtx.currentTime+0.1);
}

function startGame(){
 document.getElementById("home").style.display="none";
 document.getElementById("revive").style.display="none";

 engine = Engine.create();
 render = Render.create({
  canvas: document.getElementById("game"),
  engine,
  options:{width:innerWidth,height:innerHeight,wireframes:false,background:"#000"}
 });

 Render.run(render);
 runner = Runner.create();
 Runner.run(runner, engine);

 Composite.add(engine.world, [
  Bodies.rectangle(innerWidth/2, innerHeight+50, innerWidth,100,{isStatic:true})
 ]);

 score=0;
 sessionDust=0;
 dropCount=0;
 reviveUsed=false;
 activeBodies=[];
}

function spawn(x,lvl){
 const b = Bodies.circle(x,100,PLANETS[lvl].r,{
  restitution:0.3,
  plugin:{lvl,merged:false}
 });
 activeBodies.push(b);
 Composite.add(engine.world,b);
}

function removeBody(b){
 activeBodies = activeBodies.filter(x=>x!==b);
 Composite.remove(engine.world,b);
}

function merge(a,b){
 if(a.plugin.merged||b.plugin.merged) return;
 a.plugin.merged = b.plugin.merged = true;

 const lvl = a.plugin.lvl+1;
 const x = (a.position.x+b.position.x)/2;

 removeBody(a);
 removeBody(b);

 if(lvl < PLANETS.length){
  spawn(x,lvl);
 }

 score += lvl*100;
 sessionDust += lvl;

 play(800);
 screenShake();
}

function screenShake(){
 document.body.style.transform="translate(3px,-3px)";
 setTimeout(()=>document.body.style.transform="",100);
}

Events.on(engine,"collisionStart", e=>{
 e.pairs.forEach(p=>{
  if(
   p.bodyA !== p.bodyB &&
   p.bodyA.plugin?.lvl === p.bodyB.plugin?.lvl &&
   !p.bodyA.plugin.merged &&
   !p.bodyB.plugin.merged
  ){
   merge(p.bodyA,p.bodyB);
  }
 });
});

Events.on(engine,"beforeUpdate",()=>{
 // merge assist
 activeBodies.forEach(a=>{
  activeBodies.forEach(b=>{
   if(a!==b && a.plugin.lvl===b.plugin.lvl){
    const dx=b.position.x-a.position.x;
    const dy=b.position.y-a.position.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<120){
     Body.applyForce(a,a.position,{x:dx*MERGE_PULL,y:dy*MERGE_PULL});
    }
   }
  });
 });
});

function revive(){
 if(reviveUsed) return;

 if(sessionDust < 100) return alert("Not enough dust");

 sessionDust -= 100;
 reviveUsed = true;

 // remove top 3 dangerous bodies
 activeBodies
  .sort((a,b)=>a.position.y-b.position.y)
  .slice(0,3)
  .forEach(removeBody);

 document.getElementById("revive").style.display="none";
 engine.enabled=true;
}

function gameOver(){
 engine.enabled=false;

 if(!reviveUsed){
  document.getElementById("revive").style.display="flex";
 } else {
  endGame();
 }
}

function endGame(){
 document.getElementById("revive").style.display="none";
 document.getElementById("home").style.display="flex";
}

window.addEventListener("pointerup", e=>{
 if(Date.now()-lastDrop<500) return;

 dropCount++;

 let maxLvl = Math.min(3 + Math.floor(dropCount/20), 6);
 let lvl = Math.floor(Math.random()*maxLvl);

 spawn(e.clientX,lvl);
 play(300);

 lastDrop = Date.now();
});

</script>
</body>
</html>
