<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Supernova: Infinity v4.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --gold: #fbbf24; --danger: #ef4444; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; overflow: hidden; background: #010206; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: none; color: white; user-select: none; }
        #nebula { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #111827 0%, #010206 100%); z-index: -2; transition: background 2s; }
        #stars-parallax { position: fixed; inset: -100px; background-image: radial-gradient(white 1px, transparent 1px); background-size: 100px 100px; opacity: 0.2; z-index: -1; pointer-events: none; }
        #ui-layer { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }
        #top-bar { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; align-items: center; }
        .icon-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 50%; cursor: pointer; pointer-events: auto; backdrop-filter: blur(10px); }
        #score-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #score-label { font-size: 2.8em; font-weight: 900; text-shadow: 0 0 20px var(--accent); transition: 0.1s; }
        #score-ring { position: absolute; width: 110px; height: 110px; border-radius: 50%; border: 3px solid rgba(56, 189, 248, 0.1); border-top-color: var(--accent); transform: rotate(-90deg); }
        #right-hud { position: fixed; right: 20px; top: 85px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; }
        #preview-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; gap: 10px; backdrop-filter: blur(10px); }
        .prev-label { font-size: 0.6em; font-weight: 900; color: var(--accent); opacity: 0.7; letter-spacing: 1px; }
        #next-vis, #after-next-vis { border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #stardust-hud { position: fixed; top: 85px; left: 20px; background: var(--glass); padding: 8px 15px; border-radius: 20px; color: var(--gold); font-weight: 900; border: 1px solid rgba(251, 191, 36, 0.3); backdrop-filter: blur(10px); }
        #gravity-ui { position: fixed; right: 22px; bottom: 35px; pointer-events: auto; }
        #g-ring { width: 60px; height: 60px; border-radius: 50%; border: 2px solid rgba(251, 191, 36, 0.2); display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--gold); background: rgba(0,0,0,0.6); }
        #g-progress { position: absolute; inset: -2px; border-radius: 50%; border: 2px solid var(--gold); clip-path: inset(100% 0 0 0); transition: clip-path 0.1s linear; }
        #combo-popup { position: fixed; top: 180px; left: 50%; transform: translateX(-50%); font-size: 2.5em; color: var(--gold); font-weight: 900; opacity: 0; transition: 0.3s; pointer-events: none; }
        #danger-alert { position: fixed; left: 50%; transform: translateX(-50%); color: var(--danger); font-size: 2.5em; font-weight: 900; display: none; animation: flash 0.5s infinite alternate; }
        #nuke-flash { position: fixed; inset: 0; background: white; opacity: 0; z-index: 3000; pointer-events: none; transition: opacity 0.2s; }
        .overlay { position: fixed; inset: 0; background: rgba(1, 4, 9, 0.98); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .menu-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 28px; width: 90%; max-width: 380px; backdrop-filter: blur(25px); text-align: center; }
        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 12px; pointer-events: auto; }
        .btn-alt { background: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); }
        .stat-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; font-size: 0.75em; color: #94a3b8; text-transform: uppercase; }
        .stat-box b { display: block; font-size: 1.4em; color: var(--accent); margin-top: 4px; }
        .discovery-track { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0; margin: 10px 0; pointer-events: auto; }
        .planet-slot { flex: 0 0 70px; display: flex; flex-direction: column; align-items: center; font-size: 0.6em; }
        .planet-slot canvas { background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 5px; width: 60px; height: 60px; }
        .shop-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 14px; margin-bottom: 8px; font-size: 0.9em; pointer-events: auto; }
        .shop-btn { background: var(--gold); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        @keyframes flash { from { opacity: 0.2; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="nebula"></div><div id="stars-parallax"></div>
    <div id="stardust-hud">✨ <span id="dust-val">0</span></div>
    <div id="combo-popup">COMBO x2</div><div id="nuke-flash"></div>
    <div id="game-canvas-container"><div id="danger-alert">⚠️ DANGER ⚠️</div></div>
    <div id="ui-layer">
        <div id="top-bar"><button class="icon-btn" onclick="togglePause()">⚙️</button>
            <div id="score-container"><div id="score-ring"></div><div id="score-label">0</div></div>
        </div>
        <div id="right-hud">
            <div id="preview-box">
                <span class="prev-label">HOLD</span><div id="next-vis"></div>
                <hr style="width:100%; border:0; border-top:1px solid rgba(255,255,255,0.1); margin:5px 0;">
                <span class="prev-label">NEXT</span><div id="after-next-vis"></div>
            </div>
        </div>
        <div id="gravity-ui" onclick="flipGravity()"><div id="g-ring">G<div id="g-progress"></div></div></div>
    </div>
    <div id="home-screen" class="overlay">
        <h1 style="font-size: 3.2em; color: var(--accent); margin: 0; font-weight: 900;">SUPERNOVA</h1>
        <div class="menu-card" style="margin-top:20px">
            <div class="stat-box" style="margin-bottom:10px;">COMMANDER RANK<br><b id="rank-val">Recruit</b></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                <div class="stat-box">BEST<br><b id="best-score-val">0</b></div>
                <div class="stat-box">MERGES<br><b id="total-merges-val">0</b></div>
            </div>
            <button class="btn" onclick="startGame()">LAUNCH MISSION</button>
        </div>
    </div>
    <div id="pause-menu" class="overlay" style="display:none">
        <div class="menu-card">
            <h3>MISSION LOG</h3>
            <div class="discovery-track" id="discovery-log"></div>
            <div class="shop-row"><span><b>NUKE</b> (Lvl 1)</span><button class="shop-btn" id="buy-nuke" onclick="buyPowerUp(250, 0)">✨ 250</button></div>
            <div class="shop-row"><span><b>COLLAPSE</b> (Lvl 1-2)</span><button class="shop-btn" id="buy-collapse" onclick="buyPowerUp(500, 1)">✨ 500</button></div>
            <button class="btn" onclick="togglePause()">RESUME</button>
            <button class="btn btn-alt" onclick="restartMission()">🔄 RESTART</button>
            <button class="btn btn-alt" style="color:var(--danger)" onclick="gameOver()">ABANDON</button>
        </div>
    </div>
<script>
    const { Engine, Render, Runner, Bodies, Composite, Events, Vector } = Matter;
    let engine, render, runner, audioCtx;
    const width = window.innerWidth, height = window.innerHeight, CHARGE_TIME = 120000;
    let score = 0, sessionDust = 0, gameStarted = false, isPaused = false, isFlipped = false;
    let nextLevel = 0, afterNextLevel = 0, currentX = width/2, gravityCharge = 120000, lastDropTime = 0;
    let particles = [], comboCount = 0, lastMergeTime = 0, comet = null;
    const PLANET_DATA = [
        { name: "Star", r: 16, color: '#ffffff', glow: 'rgba(255,255,255,0.4)', star: true },
        { name: "Verda", r: 24, color: '#4ade80', glow: 'rgba(74,222,128,0.2)' },
        { name: "Ares", r: 34, color: '#f87171', glow: 'rgba(248,113,113,0.2)' },
        { name: "Solara", r: 45, color: '#fbbf24', stripes: true, glow: 'rgba(251,191,36,0.3)' },
        { name: "Nebula", r: 59, color: '#818cf8', stripes: true, glow: 'rgba(129,140,248,0.3)' },
        { name: "Saturn", r: 78, color: '#38bdf8', rings: true, glow: 'rgba(56,189,248,0.4)' },
        { name: "Sun", r: 99, color: '#ffcc33', sun: true, glow: 'rgba(255,165,0,0.6)' },
        { name: "Pulsar", r: 120, color: '#e879f9', stripes: true, glow: 'rgba(232,121,249,0.5)' },
        { name: "Void", r: 145, color: '#000000', glow: 'rgba(255,255,255,0.3)', singularity: true },
        { name: "Attractor", r: 180, color: '#f472b6', sun: true, glow: 'rgba(244,114,182,0.8)' }
    ];

    function playSound(type) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
        if(type==='drop'){ osc.frequency.setValueAtTime(440,now); osc.frequency.exponentialRampToValueAtTime(110,now+0.1); gain.gain.setValueAtTime(0.1,now); osc.start(); osc.stop(now+0.1); }
        if(type==='merge'){ osc.type='square'; osc.frequency.setValueAtTime(220,now); osc.frequency.exponentialRampToValueAtTime(880,now+0.2); gain.gain.setValueAtTime(0.05,now); osc.start(); osc.stop(now+0.2); }
        if(type==='flip'){ osc.type='sawtooth'; osc.frequency.setValueAtTime(100,now); gain.gain.setValueAtTime(0.1,now); osc.start(); osc.stop(now+0.3); }
    }

    function loadStats() {
        const data = JSON.parse(localStorage.getItem('sn_v4') || '{"best":0,"merges":0,"dust":0,"discovered":2}');
        document.getElementById('best-score-val').innerText = data.best.toLocaleString();
        document.getElementById('total-merges-val').innerText = data.merges.toLocaleString();
        document.getElementById('dust-val').innerText = (data.dust + sessionDust).toLocaleString();
        document.getElementById('rank-val').innerText = data.best > 100000 ? "Nova Lord" : data.best > 50000 ? "Commander" : "Pilot";
        return data;
    }

    function saveStats(fin=false) { let d=loadStats(); d.best=Math.max(d.best,score); if(fin){ d.dust+=sessionDust; sessionDust=0; d.merges+=comboCount; } localStorage.setItem('sn_v4',JSON.stringify(d)); loadStats(); }

    function buyPowerUp(cost, maxLvl) {
        let d=loadStats(); if(d.dust+sessionDust < cost) return;
        if(sessionDust>=cost) sessionDust-=cost; else { d.dust-=(cost-sessionDust); sessionDust=0; }
        localStorage.setItem('sn_v4',JSON.stringify(d)); document.getElementById('nuke-flash').style.opacity='1'; setTimeout(()=>document.getElementById('nuke-flash').style.opacity='0',200);
        Composite.allBodies(engine.world).forEach(b=>{ if(b.plugin?.lvl<=maxLvl){ createExplosion(b.position.x,b.position.y,PLANET_DATA[b.plugin.lvl].color); Composite.remove(engine.world,b); }});
        loadStats(); togglePause();
    }

    function startGame() {
        if(engine) { Composite.clear(engine.world); Engine.clear(engine); }
        document.getElementById('home-screen').style.display='none';
        if(!engine) engine = Engine.create({ positionIterations: 10 });
        if(!render) { render = Render.create({ element: document.getElementById('game-canvas-container'), engine, options: { width, height, wireframes: false, background: 'transparent' } }); Render.run(render); }
        if(runner) Runner.stop(runner); runner = Runner.create(); Runner.run(runner, engine);
        Composite.add(engine.world, [ Bodies.rectangle(width/2, height+30, width, 60, { isStatic: true }), Bodies.rectangle(-15, height/2, 30, height, { isStatic: true }), Bodies.rectangle(width+15, height/2, 30, height, { isStatic: true }), Bodies.rectangle(width/2, -30, width, 60, { isStatic: true }) ]);
        score=0; sessionDust=0; isFlipped=false; engine.gravity.y=1; gameStarted=true; nextLevel=Math.floor(Math.random()*3); afterNextLevel=Math.floor(Math.random()*3); updatePreview(); loadStats(); initEvents();
    }

    function initEvents() {
        Events.off(engine); Events.on(engine, 'collisionStart', (e) => { e.pairs.forEach(p => { if(p.bodyA.plugin?.lvl === p.bodyB.plugin?.lvl) performMerge(p.bodyA, p.bodyB); }); });
        Events.on(render, 'afterRender', () => {
            if (!gameStarted || isPaused) return;
            const ctx = render.context, limitY = isFlipped ? height - 160 : 160; let danger = false;
            document.getElementById('nebula').style.background = `radial-gradient(circle at 50% 50%, hsla(${(score/500)%360}, 40%, 10%, 1) 0%, #010206 100%)`;
            ctx.save(); ctx.setLineDash([4, 6]); ctx.strokeStyle = '#38bdf8'; ctx.beginPath(); ctx.moveTo(currentX, isFlipped ? height : 0); ctx.lineTo(currentX, isFlipped ? height - 140 : 140); ctx.stroke();
            ctx.setLineDash([10, 10]); ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; ctx.beginPath(); ctx.moveTo(0, limitY); ctx.lineTo(width, limitY); ctx.stroke(); ctx.restore();
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life-=0.02; ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); ctx.restore(); });
            Composite.allBodies(engine.world).forEach(b => { 
                if (b.isStatic || b.plugin?.lvl === undefined) return;
                drawPlanet(ctx, b.position.x, b.position.y, b.plugin.lvl, b.angle);
                const crossing = isFlipped ? (b.position.y > limitY) : (b.position.y < limitY);
                if (crossing && (Date.now() - b.timestamp > 2000)) { danger = true; if (!b.plugin.warn) b.plugin.warn = Date.now(); if (Date.now() - b.plugin.warn > 3500) gameOver(); } else b.plugin.warn = 0;
            });
            document.getElementById('danger-alert').style.display = danger ? 'block' : 'none';
            document.getElementById('danger-alert').style.top = isFlipped ? '75%' : '25%';
            if (gravityCharge < CHARGE_TIME) gravityCharge += 200; document.getElementById('g-progress').style.clipPath = `inset(${100 - (gravityCharge/CHARGE_TIME*100)}% 0 0 0)`;
        });
    }

    function performMerge(a, b) {
        if (a.plugin.merged || b.plugin.merged) return; a.plugin.merged = b.plugin.merged = true;
        const nl = a.plugin.lvl + 1, mid = { x: (a.position.x+b.position.x)/2, y: (a.position.y+b.position.y)/2 };
        comboCount = (Date.now() - lastMergeTime < 1500) ? comboCount + 1 : 1; lastMergeTime = Date.now();
        if(comboCount > 1) { const pop=document.getElementById('combo-popup'); pop.innerText="CHAIN x"+comboCount; pop.style.opacity=1; setTimeout(()=>pop.style.opacity=0, 800); }
        playSound('merge'); createExplosion(mid.x, mid.y, PLANET_DATA[Math.min(nl, 9)].color);
        score += (nl * 100 * comboCount); sessionDust += nl; document.getElementById('score-label').innerText = score.toLocaleString();
        Composite.remove(engine.world, [a, b]); if (nl < PLANET_DATA.length) spawn(mid.x, mid.y, nl);
    }

    function spawn(x, y, lvl) { const b = Bodies.circle(x, y, PLANET_DATA[lvl].r, { restitution: 0.3, friction: 0.1, timestamp: Date.now(), plugin: { lvl, merged: false, warn: 0 } }); Composite.add(engine.world, b); }
    function createExplosion(x, y, color) { for(let i=0; i<15; i++) particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0, color }); }
    function updatePreview() { const v=document.getElementById('next-vis'), av=document.getElementById('after-next-vis'), p=PLANET_DATA[nextLevel], ap=PLANET_DATA[afterNextLevel]; v.style.background=p.color; v.style.width=v.style.height=(p.r*0.8)+'px'; av.style.background=ap.color; av.style.width=av.style.height=(ap.r*0.6)+'px'; }
    function togglePause() { if(!gameStarted) return; isPaused = !isPaused; engine.enabled = !isPaused; document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none'; }
    function flipGravity() { if (gravityCharge >= CHARGE_TIME) { isFlipped = !isFlipped; engine.gravity.y *= -1; gravityCharge = 0; playSound('flip'); }}
    function restartMission() { saveStats(false); isPaused=false; document.getElementById('pause-menu').style.display='none'; startGame(); }
    function gameOver() { saveStats(true); gameStarted=false; engine.enabled=false; document.getElementById('home-screen').style.display='flex'; loadStats(); }

    function drawPlanet(ctx, x, y, lvl, angle) {
        const d = PLANET_DATA[lvl]; ctx.save(); ctx.translate(x, y);
        const glow = ctx.createRadialGradient(0, 0, d.r, 0, 0, d.r * 1.5); glow.addColorStop(0, d.glow); glow.addColorStop(1, 'transparent'); ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, d.r * 1.5, 0, Math.PI*2); ctx.fill();
        ctx.rotate(angle);
        const grad = ctx.createRadialGradient(-d.r/3, -d.r/3, 0, 0, 0, d.r); grad.addColorStop(0, '#ffffffaa'); grad.addColorStop(0.3, d.color); grad.addColorStop(1, '#000');
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, d.r, 0, Math.PI*2); ctx.fill();
        if (d.rings) { ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(0,0, d.r*1.6, d.r*0.4, 0, 0, Math.PI*2); ctx.stroke(); }
        ctx.restore();
    }

    window.addEventListener('pointermove', e => currentX = e.clientX);
    window.addEventListener('pointerup', e => {
        if (!gameStarted || isPaused || Date.now()-lastDropTime < 600 || e.target.closest('.icon-btn, .btn, .shop-btn, #gravity-ui')) return;
        spawn(currentX, isFlipped ? height - 100 : 100, nextLevel); playSound('drop');
        nextLevel = afterNextLevel; afterNextLevel = Math.floor(Math.random()*3); updatePreview(); lastDropTime = Date.now();
    });
</script>
</body>
</html>
