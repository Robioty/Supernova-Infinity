<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gravity Merge Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #0f172a !important; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%) !important; 
            font-family: 'Segoe UI', sans-serif; touch-action: none; position: fixed; color: white; 
        }

        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 99; transition: opacity 0.1s; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; align-items: flex-start; gap: 15px; pointer-events: none; }
        .menu-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 12px; cursor: pointer; pointer-events: auto; font-size: 1.2em; backdrop-filter: blur(10px); }
        
        #progress-wrapper { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); z-index: 20; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(to right, #38bdf8, #818cf8); transition: width 0.4s ease; box-shadow: 0 0 10px #38bdf8; }

        .floating-text { position: absolute; font-weight: 900; pointer-events: none; z-index: 30; animation: floatUp 0.6s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-40px); opacity: 0; } }

        .glass-panel { 
            position: absolute; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(56, 189, 248, 0.3); 
            border-radius: 20px; padding: 20px; display: none; flex-direction: column; align-items: center;
            z-index: 100; backdrop-filter: blur(15px); left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 280px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        #settings-panel { top: 75px; left: 15px; transform: none; width: 180px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; width: 100%; margin-bottom: 10px; }
        .toggle { width: 36px; height: 18px; background: #334155; border-radius: 20px; position: relative; cursor: pointer; }
        .toggle.on { background: #38bdf8; }
        .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .toggle.on::after { left: 20px; }

        .btn { background: #38bdf8; color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        canvas { display: block; margin: 0 auto; background: transparent !important; }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="ui">
        <button class="menu-btn" onclick="toggleSettings()">⚙️</button>
        <div>
            <div id="score-label" style="font-size: 2.8em; font-weight: 900; line-height: 1;">0</div>
            <div style="font-size: 0.75em; opacity: 0.6;">BEST: <span id="high-score-ui">0</span></div>
        </div>
    </div>

    <div id="settings-panel" class="glass-panel">
        <div class="setting-item"><span>Sound</span><div id="audio-toggle" class="toggle on" onclick="updateSetting('audio')"></div></div>
        <div class="setting-item"><span>Shake</span><div id="shake-toggle" class="toggle on" onclick="updateSetting('shake')"></div></div>
        <div class="setting-item"><span>Laser</span><div id="laser-toggle" class="toggle on" onclick="updateSetting('laser')"></div></div>
        <button class="btn" style="background:#ef4444" onclick="location.reload()">RESTART</button>
    </div>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(15,23,42,0.9); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="font-size: 3.5em; text-align:center;">GRAVITY<br><span style="color:#38bdf8">MERGE</span></h1>
        <button class="btn" onclick="initGame()" style="width:200px; padding:20px;">START</button>
    </div>

    <div id="progress-wrapper"><div id="progress-fill"></div></div>
    
    <div id="side-controls" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:12px;">
        <button id="g-toggle" class="menu-btn" style="display:none; width:54px; height:54px; border-radius:50%; color:#38bdf8; border:2px solid #38bdf8;" onclick="flipGravity()">G</button>
    </div>

<script>
    // --- AUDIO SYSTEM ---
    const AudioEngine = {
        ctx: null,
        init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(freq, type, duration, vol) {
            if (!this.ctx || !settings.audio) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq / 2, this.ctx.currentTime + duration);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        },
        drop() { this.play(150, 'sine', 0.2, 0.3); },
        merge(lvl) { this.play(200 + (lvl * 100), 'triangle', 0.3, 0.2); },
        flip() { this.play(80, 'sawtooth', 0.5, 0.1); },
        combo() { this.play(800, 'sine', 0.1, 0.2); }
    };

    const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
    const engine = Engine.create();
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ element: document.body, engine, options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio } });

    let settings = { shake: true, audio: true, laser: true };
    let gameStats = { score: 0, combo: 0, lastMergeTime: 0 };
    let nextLevel = 0, currentX = width/2, isGameOver = false, isStarted = false, isGravityFlipped = false;
    let particles = [];

    const BALL_TYPES = [
        { r: 15, col: '#22d3ee', score: 2 }, { r: 25, col: '#f43f5e', score: 5 },
        { r: 35, col: '#a3e635', score: 10 }, { r: 48, col: '#94a3b8', score: 20 },
        { r: 65, col: '#8b5cf6', score: 40 }, { r: 85, col: '#fbbf24', score: 80 },
        { r: 110, col: '#ef4444', score: 150 }, { r: 140, col: '#0f172a', score: 1000 }
    ];

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    function updateSetting(type) {
        settings[type] = !settings[type];
        document.getElementById(type + '-toggle').classList.toggle('on');
    }

    function spawnFloatingText(x, y, text, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.style.left = x + 'px'; el.style.top = y + 'px';
        el.style.color = color; el.innerText = text;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 600);
    }

    function triggerFlash() {
        if (!settings.shake) return;
        const f = document.getElementById('flash');
        f.style.opacity = '0.2';
        setTimeout(() => f.style.opacity = '0', 100);
    }

    function spawn(x, y, lvl, isMerge = false) {
        const t = BALL_TYPES[lvl];
        const b = Bodies.circle(x, y, t.r, {
            restitution: 0.3, friction: 0.1, 
            render: { fillStyle: t.col }, plugin: { level: lvl, created: Date.now() }
        });
        if (isMerge) {
            AudioEngine.merge(lvl);
            if (lvl > 4) triggerFlash();
        } else {
            AudioEngine.drop();
        }
        Composite.add(engine.world, b);
    }

    function initGame() {
        AudioEngine.init();
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-toggle').style.display = 'block';
        isStarted = true;
        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    function flipGravity() {
        AudioEngine.flip();
        engine.gravity.y *= -1; 
        isGravityFlipped = !isGravityFlipped;
        triggerFlash();
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined) {
                const lvl = a.plugin.level + 1;
                if (lvl >= BALL_TYPES.length) return;
                
                const now = Date.now();
                if(now - gameStats.lastMergeTime < 700) {
                    gameStats.combo++;
                    AudioEngine.combo();
                } else {
                    gameStats.combo = 1;
                }
                gameStats.lastMergeTime = now;
                
                const points = BALL_TYPES[a.plugin.level].score * gameStats.combo;
                gameStats.score += points;
                document.getElementById('score-label').innerText = gameStats.score;
                
                spawnFloatingText(a.position.x, a.position.y, `+${points}${gameStats.combo > 1 ? ' x' + gameStats.combo : ''}`, BALL_TYPES[lvl].col);
                
                Composite.remove(engine.world, [a, b]);
                spawn((a.position.x + b.position.x) / 2, (a.position.y + b.position.y) / 2, lvl, true);
                
                document.getElementById('progress-fill').style.width = (lvl / 7 * 100) + '%';
            }
        });
    });

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        if (settings.laser && isStarted) {
            ctx.setLineDash([5, 15]); ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath(); ctx.moveTo(currentX, isGravityFlipped ? height - 90 : 90);
            ctx.lineTo(currentX, isGravityFlipped ? 0 : height); ctx.stroke();
            
            // Preview Circle
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = BALL_TYPES[nextLevel].col;
            ctx.beginPath(); 
            ctx.arc(currentX, isGravityFlipped ? height - 90 : 90, BALL_TYPES[nextLevel].r, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    });

    window.addEventListener('pointermove', (e) => { currentX = Math.max(30, Math.min(width - 30, e.clientX)); });
    window.addEventListener('pointerup', (e) => {
        if (!isStarted || isGameOver || e.target.closest('.menu-btn') || e.target.closest('.glass-panel')) return;
        spawn(currentX, isGravityFlipped ? height - 90 : 90, nextLevel);
        nextLevel = Math.floor(Math.random() * 3);
    });

    const wallOpts = { isStatic: true, render: { visible: false } };
    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+25, width, 50, wallOpts),
        Bodies.rectangle(width/2, -25, width, 50, wallOpts),
        Bodies.rectangle(-25, height/2, 50, height, wallOpts),
        Bodies.rectangle(width+25, height/2, 50, height, wallOpts)
    ]);
</script>
</body>
</html>
